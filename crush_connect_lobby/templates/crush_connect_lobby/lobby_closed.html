{% extends "crush_lu/base.html" %}
{% load i18n %}

{% block content %}
<div class="max-w-md mx-auto my-12 px-6 py-8 bg-white dark:bg-zinc-900 shadow-xl rounded-2xl border border-zinc-100 dark:border-zinc-800 text-center">
    <div class="mb-6 flex justify-center">
        <div class="w-16 h-16 bg-amber-100 dark:bg-amber-900/30 rounded-full flex items-center justify-center text-amber-600 dark:text-amber-400">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
    </div>
    
    <h1 class="text-2xl font-bold mb-3 text-zinc-900 dark:text-zinc-50">{% trans "Lobby Closed" %}</h1>
    <p class="text-zinc-600 dark:text-zinc-400 mb-6 text-sm leading-relaxed">
        {% blocktrans %}
        The lobby and 48-hour recap window for <strong>{{ event.title }}</strong> have expired.
        {% endblocktrans %}
    </p>

    <a href="{% url 'crush_connect_lobby:people_ive_met' %}" class="block w-full py-3 px-4 bg-violet-600 hover:bg-violet-700 text-white font-medium rounded-xl transition duration-150 shadow-md mb-3">
        {% trans "View People I've Met" %}
    </a>
    
    <a href="{% url 'crush_lu:dashboard' %}" class="block w-full py-3 px-4 bg-zinc-200 dark:bg-zinc-800 hover:bg-zinc-300 dark:hover:bg-zinc-700 text-zinc-800 dark:text-zinc-200 font-medium rounded-xl transition duration-150">
        {% trans "Return to Dashboard" %}
    </a>
</div>
{% endblock %}
