{% load static %}
<header
    class="sticky top-0 z-50 border-b border-gray-800 bg-gray-950/80 backdrop-blur-sm"
>
    <nav class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
        <div class="flex h-16 justify-between">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="{% url 'tableau:home' %}" class="flex items-center space-x-2">
                    <div
                        class="flex h-8 w-8 items-center justify-center rounded-lg bg-gradient-to-br from-indigo-500 to-purple-600"
                    >
                        <span class="text-lg font-bold text-white">T</span>
                    </div>
                    <span class="text-xl font-bold text-white">Tableau</span>
                </a>
            </div>

            <!-- Desktop Navigation -->
            <div class="hidden md:flex md:items-center md:space-x-8">
                <a
                    href="{% url 'tableau:about' %}"
                    class="font-medium text-gray-300 transition-colors duration-200 hover:text-white"
                >
                    About
                </a>
                <a
                    href="#gallery"
                    class="font-medium text-gray-300 transition-colors duration-200 hover:text-white"
                >
                    Gallery
                </a>
                <a
                    href="#"
                    class="inline-flex items-center justify-center rounded-lg border border-transparent bg-indigo-600 px-4 py-2 text-sm font-medium text-white transition-colors duration-200 hover:bg-indigo-700"
                >
                    Coming Soon
                </a>
            </div>

            <!-- Mobile menu button (CSS-only toggle using checkbox hack) -->
            <div class="flex items-center md:hidden">
                <input type="checkbox" id="mobile-menu-toggle" class="peer hidden" />
                <label
                    for="mobile-menu-toggle"
                    class="cursor-pointer rounded-lg p-2 hover:bg-gray-800"
                >
                    <svg
                        class="h-6 w-6 text-gray-300"
                        fill="none"
                        viewBox="0 0 24 24"
                        stroke="currentColor"
                    >
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16"
                        />
                    </svg>
                </label>
            </div>
        </div>

        <!-- Mobile Navigation (CSS-only, uses peer selector) -->
        <div class="hidden pb-4 peer-checked:block md:hidden">
            <div class="flex flex-col space-y-3 border-t border-gray-800 pt-4">
                <a
                    href="{% url 'tableau:about' %}"
                    class="py-2 font-medium text-gray-300 hover:text-white"
                >
                    About
                </a>
                <a
                    href="#gallery"
                    class="py-2 font-medium text-gray-300 hover:text-white"
                >
                    Gallery
                </a>
                <a
                    href="#"
                    class="inline-flex items-center justify-center rounded-lg border border-transparent bg-indigo-600 px-4 py-2 text-center text-sm font-medium text-white transition-colors duration-200 hover:bg-indigo-700"
                >
                    Coming Soon
                </a>
            </div>
        </div>
    </nav>
</header>
