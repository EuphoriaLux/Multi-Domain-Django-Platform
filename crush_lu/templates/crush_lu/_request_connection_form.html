{% load i18n %}
<div id="connection-actions-{{ recipient.id }}" class="space-y-2" role="status" aria-live="polite"
     x-data="connectionForm">
    <form hx-post="{% url 'crush_lu:request_connection_inline' event.id recipient.id %}"
          hx-target="#connection-actions-{{ recipient.id }}"
          hx-swap="outerHTML"
          hx-confirm="{% trans 'Declare your crush? It stays completely private — they are never notified — and it cannot be undone. Your Crush Coach will call you within 48 hours to talk about it.' %}"
          class="space-y-2">
        {% csrf_token %}
        <div>
            <textarea name="note"
                      x-ref="note"
                      rows="2"
                      maxlength="300"
                      placeholder="{% trans 'Tell your coach what happened (optional)...' %}"
                      class="w-full px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500"></textarea>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                {% trans "Only your Crush Coach will read this — never your crush." %}
            </p>
            <div class="flex flex-wrap gap-1.5 mt-1.5">
                <button type="button"
                        @click="prefill"
                        data-prefill="{% trans 'I really enjoyed our chat about' %}"
                        class="text-xs px-2 py-1 rounded-full bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/50 transition-colors">
                    {% trans "I really enjoyed our chat about…" %}
                </button>
                <button type="button"
                        @click="prefill"
                        data-prefill="{% trans 'What stood out to me about you was' %}"
                        class="text-xs px-2 py-1 rounded-full bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/50 transition-colors">
                    {% trans "What stood out about you…" %}
                </button>
                <button type="button"
                        @click="prefill"
                        data-prefill="{% trans 'I would love to continue our conversation on' %}"
                        class="text-xs px-2 py-1 rounded-full bg-purple-50 dark:bg-purple-900/30 text-purple-700 dark:text-purple-300 hover:bg-purple-100 dark:hover:bg-purple-900/50 transition-colors">
                    {% trans "Let's continue our conversation…" %}
                </button>
            </div>
        </div>
        <div class="flex flex-col sm:flex-row gap-2">
            <button type="submit"
                    class="btn-crush-primary px-4 py-2.5 inline-flex items-center justify-center gap-2">
                <span class="htmx-indicator">
                    {% include "shared/icons/loading.html" with class="w-4 h-4 animate-spin" %}
                </span>
                <span class="htmx-hide-on-request inline-flex items-center gap-1">
                    {% include "shared/icons/heart.html" with class="w-4 h-4" %}
                    {% trans "Declare My Crush!" %}
                </span>
            </button>
            <button type="button"
                    hx-get="{% url 'crush_lu:connection_actions' event.id recipient.id %}"
                    hx-target="#connection-actions-{{ recipient.id }}"
                    hx-swap="outerHTML"
                    class="px-4 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors text-center">
                {% trans "Cancel" %}
            </button>
        </div>
    </form>
</div>
