{% load i18n %}
<div
    id="connection-actions-{{ recipient.id }}"
    class="space-y-2"
    role="status"
    aria-live="polite"
>
    <form
        hx-post="{% url 'crush_lu:request_connection_inline' event.id recipient.id %}"
        hx-target="#connection-actions-{{ recipient.id }}"
        hx-swap="outerHTML"
        class="space-y-2"
    >
        {% csrf_token %}
        <div>
            <textarea
                name="note"
                rows="2"
                placeholder="{% trans 'Add a note (optional)...' %}"
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:border-purple-500 focus:ring-2 focus:ring-purple-500 dark:border-gray-600 dark:bg-gray-700 dark:text-white"
            ></textarea>
        </div>
        <div class="flex flex-col gap-2 sm:flex-row">
            <button
                type="submit"
                class="btn-crush-primary inline-flex items-center justify-center gap-2 px-4 py-2.5"
            >
                <span class="htmx-indicator">
                    {% include "shared/icons/loading.html" with class="w-4 h-4
                    animate-spin" %}
                </span>
                <span class="htmx-hide-on-request inline-flex items-center gap-1">
                    {% include "shared/icons/heart.html" with class="w-4 h-4" %} {%
                    trans "Send Request" %}
                </span>
            </button>
            <button
                type="button"
                hx-get="{% url 'crush_lu:connection_actions' event.id recipient.id %}"
                hx-target="#connection-actions-{{ recipient.id }}"
                hx-swap="outerHTML"
                class="rounded-lg border border-gray-300 px-4 py-2.5 text-center text-gray-700 transition-colors hover:bg-gray-50 dark:border-gray-600 dark:text-gray-200 dark:hover:bg-gray-700"
            >
                {% trans "Cancel" %}
            </button>
        </div>
    </form>
</div>
