{% load i18n %} {# Locked navigation item with tooltip - shown when feature is
unavailable #}
<div class="group relative">
    <span
        class="flex cursor-not-allowed items-center text-sm font-medium text-white/50 dark:text-white/40"
    >
        {{ label }} {% include "shared/icons/lock-closed.html" with class="w-3.5 h-3.5
        ml-1" %}
    </span>
    {# Tooltip on hover #}
    <div
        class="hover-tooltip bg-crush-dark/95 before:border-b-crush-dark/95 absolute top-full left-1/2 z-50 mt-2 -translate-x-1/2 rounded-lg px-3 py-2 text-xs whitespace-nowrap text-white shadow-lg before:absolute before:bottom-full before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:content-['']"
    >
        {{ tooltip }}
    </div>
</div>
