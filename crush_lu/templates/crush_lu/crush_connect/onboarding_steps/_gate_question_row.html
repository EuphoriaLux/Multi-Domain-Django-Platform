{% load i18n %}
<div data-gate-row
     class="rounded-xl border border-gray-200 dark:border-slate-700 p-3.5 flex flex-col sm:flex-row sm:items-center gap-3
            {% if row.selected %}border-crush-purple bg-crush-purple/5{% endif %}">
    <span class="flex-1 text-sm text-gray-800 dark:text-gray-100">{{ row.question.text }}</span>
    <div class="inline-flex shrink-0 rounded-lg overflow-hidden ring-1 ring-gray-200 dark:ring-slate-600 text-xs font-semibold">
        {# Skip / Yes / No segmented control. Radios named q_<id>; value "" = skip. #}
        <label class="cursor-pointer">
            <input type="radio" name="q_{{ row.question.id }}" value="" data-gate class="peer sr-only" @change="onPick"
                   {% if not row.field.value or row.field.value == '' %}checked{% endif %}>
            <span class="block px-3 py-1.5 text-gray-500 dark:text-gray-400 bg-white dark:bg-slate-800 peer-checked:bg-gray-100 dark:peer-checked:bg-slate-700 peer-checked:text-gray-700 dark:peer-checked:text-gray-200">{% trans "Skip" %}</span>
        </label>
        <label class="cursor-pointer border-l border-gray-200 dark:border-slate-600">
            <input type="radio" name="q_{{ row.question.id }}" value="yes" data-gate class="peer sr-only" @change="onPick"
                   {% if row.field.value == 'yes' %}checked{% endif %}>
            <span class="block px-3 py-1.5 text-gray-600 dark:text-gray-300 bg-white dark:bg-slate-800 peer-checked:bg-green-500 peer-checked:text-white peer-disabled:opacity-40">{% trans "Yes" %}</span>
        </label>
        <label class="cursor-pointer border-l border-gray-200 dark:border-slate-600">
            <input type="radio" name="q_{{ row.question.id }}" value="no" data-gate class="peer sr-only" @change="onPick"
                   {% if row.field.value == 'no' %}checked{% endif %}>
            <span class="block px-3 py-1.5 text-gray-600 dark:text-gray-300 bg-white dark:bg-slate-800 peer-checked:bg-rose-500 peer-checked:text-white peer-disabled:opacity-40">{% trans "No" %}</span>
        </label>
    </div>
</div>
