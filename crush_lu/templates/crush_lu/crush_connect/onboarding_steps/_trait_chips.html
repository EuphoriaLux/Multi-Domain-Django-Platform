{% load i18n %}
{# Reusable trait chip picker (peer-checked checkboxes, server-validated cap). Params: field_name, choices_qs, selected_ids, heading, hint, field_errors. #}
<div>
    <label class="connect-label">{{ heading }}{% if hint %} <span class="connect-label-hint">— {{ hint }}</span>{% endif %}</label>
    <div class="flex flex-wrap gap-2">
        {% for trait in choices_qs %}
        <label class="cursor-pointer block">
            <input type="checkbox" name="{{ field_name }}" value="{{ trait.pk }}" class="peer hidden"
                   {% if trait.pk in selected_ids %}checked{% endif %}>
            <span class="connect-selectable connect-chip">
                {{ trait.label }}
            </span>
        </label>
        {% endfor %}
    </div>
    {% if field_errors %}<p class="text-sm text-red-600 dark:text-red-400 mt-1">{{ field_errors|join:" " }}</p>{% endif %}
</div>
