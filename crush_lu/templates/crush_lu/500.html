<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Something went wrong – Crush.lu</title>
  <style>
    /* Standalone: no external CSS, no context processors — must render even
       when the rest of the request pipeline is broken. */
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #faf7fb;
      color: #2d2d2d;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      text-align: center;
      padding: 1.5rem;
    }
    .card { max-width: 28rem; }
    .code { font-size: 4.5rem; font-weight: 700; color: #9b59b6; margin: 0; }
    h1 { font-size: 1.5rem; font-style: italic; margin: 0.5rem 0 0; }
    p { color: #555; margin: 0.75rem 0 1.75rem; line-height: 1.5; }
    a.home {
      display: inline-block;
      padding: 0.75rem 1.75rem;
      border-radius: 0.5rem;
      background: #9b59b6;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="code">500</p>
    <h1>Something went wrong on our end</h1>
    <p>We've hit an unexpected error. Our team has been notified — please try again in a moment.</p>
    <a class="home" href="/">Back to home</a>
  </div>
</body>
</html>
