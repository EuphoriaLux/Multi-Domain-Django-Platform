      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

          values="1;1.02;1;1.01;1" additive="sum"

          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Tiny round spectacles on face -->
      <g transform="translate(242,185)">
        <!-- Left lens -->
        <circle cx="-35" cy="0" r="16" fill="none" stroke="#2C5282" stroke-width="2.5"/>
        <!-- Right lens -->
        <circle cx="35" cy="0" r="16" fill="none" stroke="#2C5282" stroke-width="2.5"/>
        <!-- Bridge -->
        <path d="M-19,0 C-12,-5 12,-5 19,0" fill="none" stroke="#2C5282" stroke-width="2.5"/>
        <!-- Lens glint -->
        <circle cx="-30" cy="-5" r="3" fill="#FFF" opacity="0.3">
          <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite"/>
        </circle>
        <circle cx="40" cy="-5" r="3" fill="#FFF" opacity="0.3">
          <animate attributeName="opacity" values="0.1;0.4;0.1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
        </circle>
      </g>

      <!-- Glowing spell book floating to the left -->
      <g transform="translate(148,215)">
        <animateTransform attributeName="transform" type="translate"
          values="148 215;148 212;148 215" dur="3s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
        <!-- Book cover -->
        <rect x="-18" y="-13.5" width="36" height="27" rx="3" fill="#2C5282"/>
        <!-- Book pages -->
        <rect x="-16" y="-10.5" width="32" height="21" rx="1.5" fill="#FFF5EB"/>
        <!-- Page lines -->
        <line x1="-12" y1="-5" x2="12" y2="-5" stroke="#A0AEC0" stroke-width="0.7"/>
        <line x1="-12" y1="0" x2="9" y2="0" stroke="#A0AEC0" stroke-width="0.7"/>
        <line x1="-12" y1="5" x2="10" y2="5" stroke="#A0AEC0" stroke-width="0.7"/>
        <!-- Book spine -->
        <line x1="0" y1="-13.5" x2="0" y2="13.5" stroke="#1A365D" stroke-width="1.5"/>
        <!-- Glow -->
        <rect x="-21" y="-16" width="42" height="32" rx="5" fill="#9AE6B4" opacity="0.1">
          <animate attributeName="opacity" values="0.05;0.15;0.05" dur="2.5s" repeatCount="indefinite"/>
        </rect>
        <!-- Tiny glowing rune -->
        <path d="M0,-7.5 L1.5,-4.5 L-1.5,-1.5 L1.5,1.5" fill="none" stroke="#9AE6B4" stroke-width="1.2" opacity="0.6" transform="translate(-7,-1.5)">
          <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
        </path>
      </g>

      <!-- Star-tipped wand (right side) -->
      <g transform="translate(342,220) rotate(-20)">
        <!-- Wand shaft -->
        <rect x="-2" y="-30" width="4" height="48" rx="1.5" fill="#8B4513"/>
        <!-- Star tip -->
        <g transform="translate(0,-37)">
          <polygon points="0,-11.2 2.8,-4.2 9.8,-3.5 4.2,1.4 5.6,8.4 0,4.9 -5.6,8.4 -4.2,1.4 -9.8,-3.5 -2.8,-4.2" fill="#ECC94B">
            <animate attributeName="fill" values="#ECC94B;#FFD700;#ECC94B" dur="2s" repeatCount="indefinite"/>
          </polygon>
          <!-- Star glow -->
          <circle cx="0" cy="0" r="7" fill="#FFD700" opacity="0.15">
            <animate attributeName="opacity" values="0.05;0.25;0.05" dur="2s" repeatCount="indefinite"/>
            <animate attributeName="r" values="7;10;7" dur="2s" repeatCount="indefinite"/>
          </circle>
        </g>
      </g>

      <!-- Left eye (behind spectacles) - focused, kind -->
      <g transform="translate(207,185)">
        <circle cx="0" cy="0" r="7" fill="#27183f"/>
        <circle cx="1.5" cy="-1" r="2.5" fill="#FFF" opacity="0.9"/>
        <!-- Slightly raised brow (analytical) -->
        <line x1="-8" y1="-14" x2="6" y2="-12" stroke="#27183f" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Right eye (behind spectacles) -->
      <g transform="translate(277,185)">
        <circle cx="0" cy="0" r="7" fill="#27183f"/>
        <circle cx="1.5" cy="-1" r="2.5" fill="#FFF" opacity="0.9"/>
        <line x1="-6" y1="-12" x2="8" y2="-13" stroke="#27183f" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Rosy cheeks -->
      <ellipse cx="185" cy="218" rx="13" ry="7" fill="#FF8EC6" opacity="0.35">
        <animate attributeName="opacity" values="0.25;0.45;0.25" dur="2.5s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="300" cy="218" rx="13" ry="7" fill="#FF8EC6" opacity="0.35">
        <animate attributeName="opacity" values="0.25;0.45;0.25" dur="2.5s" repeatCount="indefinite" begin="0.4s"/>
      </ellipse>

      <!-- Mouth - kind helpful smile -->
      <path d="M224,244 Q244,262 264,244" fill="#27183f" stroke="#27183f" stroke-width="1">
        <animate attributeName="d"
          values="M224,244 Q244,262 264,244;M223,244 Q244,264 265,244;M224,244 Q244,262 264,244"
          dur="3.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Virgo zodiac symbol -->
      <g transform="translate(150,140)">
        <text font-family="serif" font-size="20" fill="#6B8E23" text-anchor="middle" dominant-baseline="central">&#x264D;</text>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      </g>

      <!-- Organized neat sparkles (in a tidy pattern) -->
      <path d="M0,-5 L1.3,-1.3 L5,0 L1.3,1.3 L0,5 L-1.3,1.3 L-5,0 L-1.3,-1.3Z" fill="#9AE6B4" transform="translate(160,160)">
        <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale"
          values="0.5;1.1;0.5" dur="2.5s" repeatCount="indefinite" additive="sum"/>
      </path>
      <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1Z" fill="#68D391" transform="translate(170,175)">

        <animateTransform attributeName="transform" type="scale"
          values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite" begin="0.8s" additive="sum"/>
      </path>

        <animateTransform attributeName="transform" type="scale"
          values="0.5;0.9;0.5" dur="2.5s" repeatCount="indefinite" begin="1.6s" additive="sum"/>
      </path>

    </g>
  </g>
