    class="{{ class|default:'w-7 h-7' }}"

            <path
                d="M190,192 Q200,200 210,192"
                fill="none"
                stroke="#27183f"
                stroke-width="4"
                stroke-linecap="round"

                stroke="#27183f"
                stroke-width="4"

            <g transform="translate(178,192)">
                <path d="M0,0 Q1.5,-3 0,-5 Q-1.5,-3 0,0Z" fill="#87CEEB" opacity="0.6">

                        type="translate"
                        values="0 0;-2 8;-3 16"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.6;0.3;0"
                        dur="2s"
                        repeatCount="indefinite"
                    />

            </g>
            <g transform="translate(298,192)">

                        type="translate"
                        values="0 0;2 8;3 16"
                        dur="2.2s"
                        repeatCount="indefinite"
                        begin="0.4s"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.6;0.3;0"
                        dur="2.2s"
                        repeatCount="indefinite"
                        begin="0.4s"
                    />
                </path>
            </g>

            <ellipse cx="182" cy="215" rx="15" ry="8" fill="#FF8EC6" opacity="0.55">
                <animate
                    attributeName="opacity"
                    values="0.35;0.65;0.35"
                    dur="1.5s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="302" cy="215" rx="15" ry="8" fill="#FF8EC6" opacity="0.55">
                <animate
                    attributeName="opacity"
                    values="0.35;0.65;0.35"
                    dur="1.5s"
                    repeatCount="indefinite"
                    begin="0.2s"
                />
            </ellipse>

            <!-- Mouth - wide open laughing -->
            <path
                d="M215,240 Q244,280 273,240"
                fill="#27183f"
                stroke="#27183f"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M215,240 Q244,280 273,240;M218,240 Q244,276 270,240;M215,240 Q244,280 273,240"
                    dur="1s"
                    repeatCount="indefinite"

            <g>

                <g transform="translate(165,130)">
                    <line

                        y1="0"
                        x2="0"
                        y2="10"

                    attributeName="transform"
                    type="translate"
                    values="0 0;-5 -20;-8 -45"
                    dur="2.5s"
                    repeatCount="indefinite"
                />

                    attributeName="opacity"
                    values="0.8;0.5;0"
                    dur="2.5s"
                    repeatCount="indefinite"
                />

            <g>

                    <line
                        x1="0"
                        y1="0"
                        x2="0"
                        y2="10"
                        stroke="#C084FC"
                        stroke-width="2.5"
                        stroke-linecap="round"
                    />
                    <circle cx="0" cy="14" r="1.5" fill="#C084FC" />
                </g>
                <animateTransform
                    attributeName="transform"
                    type="translate"
                    values="0 0;5 -18;8 -40"
                    dur="3s"
                    repeatCount="indefinite"
                    begin="0.6s"
                />
                <animate
                    attributeName="opacity"
                    values="0.7;0.4;0"
                    dur="3s"
                    repeatCount="indefinite"
                    begin="0.6s"
                />
            </g>
            <g>
                <!-- Center small exclamation -->
                <g transform="translate(250,115)">
                    <line
                        x1="0"
                        y1="0"
                        x2="0"
                        y2="8"
                        stroke="#FFD700"
                        stroke-width="2"
                        stroke-linecap="round"
                    />
                    <circle cx="0" cy="11" r="1.2" fill="#FFD700" />
                </g>
                <animateTransform
                    attributeName="transform"
                    type="translate"
                    values="0 0;-2 -15;-3 -35"
                    dur="2.8s"
                    repeatCount="indefinite"
                    begin="1.2s"
                />

                    attributeName="opacity"
                    values="0.6;0.3;0"
                    dur="2.8s"
                    repeatCount="indefinite"
                    begin="1.2s"
                />

            <path
                d="M0,-5 L1.5,-1.5 L5,0 L1.5,1.5 L0,5 L-1.5,1.5 L-5,0 L-1.5,-1.5Z"
                fill="#FFD700"

                    dur="1.2s"
                    repeatCount="indefinite"

                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="0.5;1.3;0.5"
                    dur="1.2s"
                    repeatCount="indefinite"
                    additive="sum"

                    attributeName="opacity"
                    values="0;0.9;0"
                    dur="1.5s"
                    repeatCount="indefinite"

                    attributeName="transform"
                    type="scale"
                    values="0.5;1.2;0.5"
                    dur="1.5s"
                    repeatCount="indefinite"
                    begin="0.4s"
                    additive="sum"
