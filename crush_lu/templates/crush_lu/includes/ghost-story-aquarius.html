<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="89 75 318 325"
    class="{{ class|default:'w-7 h-7' }}"
    aria-hidden="true"
>
    {# Ghost Story - Aquarius Ghost: The Eccentric Stargazer Wizard — pointy wizard hat
    with stars/moons, crystal ball, electric sparks #}

    <g>
        <!-- Free-flowing float -->
        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -10;0 -4;0 -8;0 0"
            dur="3.2s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        />

        <g>
            <!-- Flowing sway -->
            <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 248 230;-3 248 230;0 248 230;3 248 230;0 248 230"
                dur="3.2s"
                repeatCount="indefinite"
                calcMode="spline"
                keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
            />

            <!-- Ghost body - air element lavender ice -->

                fill="#F0F0FF"
                transform="translate(293.3125,126.1875)"
            >
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="1;1.03;1;1.01;1"
                    additive="sum"
                    dur="3s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Pointy wizard hat with stars and moons -->
            <g transform="translate(244,118)">
                <!-- Hat cone -->
                <polygon points="-38,12 5,-70 45,12" fill="#2B6CB0" />
                <!-- Hat brim -->
                <ellipse cx="2" cy="12" rx="48" ry="8" fill="#1A365D" />
                <!-- Hat band -->
                <path
                    d="M-38,12 C-18,6 22,6 45,12"
                    fill="none"
                    stroke="#63B3ED"
                    stroke-width="2.5"
                />
                <!-- Star on hat -->
                <polygon
                    points="0,-45 2,-38 7,-37 3,-33 3.5,-28 0,-31 -3.5,-28 -3,-33 -7,-37 -2,-38"
                    fill="#ECC94B"
                >
                    <animate
                        attributeName="fill"
                        values="#ECC94B;#FFD700;#ECC94B"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </polygon>
                <!-- Moon on hat -->
                <g transform="translate(-15,-25)">
                    <circle cx="0" cy="0" r="5.5" fill="#ECC94B" />
                    <circle cx="2.5" cy="-1.5" r="4.5" fill="#2B6CB0" />
                </g>
                <!-- Small star -->
                <polygon
                    points="19,-20 20.5,-16 24,-16 21,-13 22,-9 19,-12 16,-9 17,-13 14,-16 17.5,-16"
                    fill="#FFD700"
                    opacity="0.8"
                />
                <!-- Hat tip droops slightly -->
                <circle cx="5" cy="-70" r="4" fill="#63B3ED" />
            </g>

            <!-- Crystal ball floating to the left -->
            <g transform="translate(148,230)">
                <animateTransform
                    attributeName="transform"
                    type="translate"
                    values="148 230;148 226;148 230"
                    dur="3s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
                <!-- Ball -->
                <circle cx="0" cy="0" r="20" fill="#2B6CB0" opacity="0.3" />
                <circle
                    cx="0"
                    cy="0"
                    r="20"
                    fill="none"
                    stroke="#63B3ED"
                    stroke-width="2"
                />
                <!-- Swirling galaxy inside -->
                <ellipse
                    cx="-2"
                    cy="1"
                    rx="12"
                    ry="6"
                    fill="none"
                    stroke="#7C3AED"
                    stroke-width="1.4"
                    opacity="0.5"
                    transform="rotate(-20)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="rotate"
                        values="-20;340"
                        dur="6s"
                        repeatCount="indefinite"
                    />
                </ellipse>
                <!-- Stars inside ball -->
                <circle cx="-5" cy="-5" r="1.5" fill="#FFD700" opacity="0.7">
                    <animate
                        attributeName="opacity"
                        values="0.4;0.9;0.4"
                        dur="1.5s"
                        repeatCount="indefinite"
                    />
                </circle>
                <circle cx="6" cy="3" r="1.2" fill="#ECC94B" opacity="0.6">
                    <animate
                        attributeName="opacity"
                        values="0.3;0.8;0.3"
                        dur="2s"
                        repeatCount="indefinite"
                        begin="0.5s"
                    />
                </circle>
                <circle cx="0" cy="7" r="1" fill="#FFD700" opacity="0.5">
                    <animate
                        attributeName="opacity"
                        values="0.2;0.7;0.2"
                        dur="1.8s"
                        repeatCount="indefinite"
                        begin="1s"
                    />
                </circle>
                <!-- Highlight reflection -->
                <circle cx="-7" cy="-7" r="4.5" fill="#FFF" opacity="0.15" />
                <!-- Base pedestal -->
                <ellipse cx="0" cy="20" rx="12" ry="4.5" fill="#1A365D" opacity="0.6" />
            </g>

            <!-- Electric sparks from hat -->
            <g transform="translate(280,85)">
                <path
                    d="M0,0 L-4,11 L3,8 L-1.5,20"
                    fill="none"
                    stroke="#63B3ED"
                    stroke-width="2.5"
                    stroke-linecap="round"
                >
                    <animate
                        attributeName="opacity"
                        values="0;0.9;0"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </path>
            </g>
            <g transform="translate(210,80)">
                <path
                    d="M0,0 L4,10 L-3,7 L1.5,17"
                    fill="none"
                    stroke="#7C3AED"
                    stroke-width="2.5"
                    stroke-linecap="round"
                >
                    <animate
                        attributeName="opacity"
                        values="0;0.8;0"
                        dur="2.5s"
                        repeatCount="indefinite"
                        begin="0.8s"
                    />
                </path>
            </g>
            <g transform="translate(250,75)">
                <path
                    d="M0,0 L-3,7 L1.5,6 L-1.5,13"
                    fill="none"
                    stroke="#38B2AC"
                    stroke-width="2.5"
                    stroke-linecap="round"
                >
                    <animate
                        attributeName="opacity"
                        values="0;0.7;0"
                        dur="1.8s"
                        repeatCount="indefinite"
                        begin="1.5s"
                    />
                </path>
            </g>

            <!-- Left eye - visionary, slightly surprised aha! look -->
            <g transform="translate(205,188)">
                <circle cx="0" cy="0" r="9" fill="#27183f" />
                <circle cx="0" cy="-2" r="4" fill="#FFF" opacity="0.9" />
                <circle cx="1" cy="-3" r="2" fill="#FFF" opacity="0.5" />
            </g>

            <!-- Right eye - visionary -->
            <g transform="translate(278,188)">
                <circle cx="0" cy="0" r="9" fill="#27183f" />
                <circle cx="0" cy="-2" r="4" fill="#FFF" opacity="0.9" />
                <circle cx="1" cy="-3" r="2" fill="#FFF" opacity="0.5" />
            </g>

            <!-- Rosy cheeks -->
            <ellipse cx="185" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.35">
                <animate
                    attributeName="opacity"
                    values="0.25;0.45;0.25"
                    dur="2.5s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="300" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.35">
                <animate
                    attributeName="opacity"
                    values="0.25;0.45;0.25"
                    dur="2.5s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </ellipse>

            <!-- Mouth - knowing quirky smirk -->
            <path
                d="M222,244 Q244,264 266,244"
                fill="#27183f"
                stroke="#27183f"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M222,244 Q244,264 266,244;M221,244 Q244,266 267,244;M222,244 Q244,264 266,244"
                    dur="3.5s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Aquarius zodiac symbol -->
            <g transform="translate(360,140)">
                <text
                    font-family="serif"
                    font-size="20"
                    fill="#63B3ED"
                    text-anchor="middle"
                    dominant-baseline="central"
                >
                    &#x2652;
                </text>
                <animate
                    attributeName="opacity"
                    values="0.5;1;0.5"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </g>

            <!-- Electric sparkle -->
            <path
                d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5Z"
                fill="#7C3AED"
                transform="translate(340,110)"
            >
                <animate
                    attributeName="opacity"
                    values="0;0.9;0"
                    dur="1.8s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="0.5;1.3;0.5"
                    dur="1.8s"
                    repeatCount="indefinite"
                    begin="0.4s"
                    additive="sum"
                />
            </path>
        </g>
    </g>
</svg>
