<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="89 75 318 325"
    class="{{ class|default:'w-7 h-7' }}"
    aria-hidden="true"
>
    {# Ghost Story - Sagittarius Ghost: The Wandering Forest Archer — Robin Hood hat,
    heart-tipped arrows, glowing compass star, stardust trail #}

    <g>
        <!-- Adventurous float -->
        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -11;0 -3;0 -9;0 0"
            dur="2.8s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        />

        <g>
            <!-- Energetic sway -->
            <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 248 230;-3 248 230;0 248 230;3 248 230;0 248 230"
                dur="2.8s"
                repeatCount="indefinite"
                calcMode="spline"
                keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
            />

            <!-- Ghost body - fire element warm peach -->
            <path
                d="M0 0 C20.10256691 16.26024803 34.87819428 37.57947896 38.1875 63.76953125 C38.46074249 68.12006401 38.59879554 72.45510272 38.6875 76.8125 C39.49397619 108.73115191 42.19992181 139.06430556 66.3359375 162.734375 C70.00595213 165.97764375 73.95948905 168.8070311 77.953125 171.63671875 C82.9917218 175.64600221 85.36027289 179.29625985 86.48828125 185.546875 C86.87339201 189.92656604 85.95121208 193.0673738 83.375 196.625 C77.90943725 202.72120461 70.88920791 205.2992975 63.3359375 208.01953125 C50.85398343 212.53885945 45.98921795 218.32090001 39.01953125 229.25390625 C33.70859595 237.46871692 27.49316695 242.9501775 17.75 245.25 C10.388348 246.38875554 3.34927772 245.1730557 -3.875 243.6875 C-10.12959473 242.53978632 -15.95813152 241.87814751 -21.65625 245.1640625 C-25.54523688 248.08080266 -28.92792527 251.39678091 -32.3125 254.875 C-40.66120582 263.40519942 -50.43310595 268.95599728 -62.5 269.25 C-73.76530721 268.87286769 -82.79467839 262.91379118 -90.50390625 254.9375 C-92.75099008 252.29729783 -94.73016862 249.50490583 -96.75 246.6875 C-101.32320213 240.49429915 -105.56878234 236.26373689 -113.3125 234.875 C-116.79371116 234.61863174 -119.69589039 235.36413376 -123.0546875 236.3125 C-130.93101016 238.05673754 -138.12014382 237.43490546 -145.13671875 233.40625 C-151.75307285 228.55980032 -154.82181713 221.11947486 -158.2109375 213.86328125 C-163.63290399 205.99235963 -172.98560762 204.06453593 -181.7109375 201.49609375 C-188.522037 199.37992844 -193.06039335 197.11558975 -197.1875 191.0625 C-199.03855323 185.71501288 -199.07285512 181.04883859 -197.25 175.6875 C-193.32438105 169.86238801 -188.78887337 165.98205892 -182.8125 162.3125 C-169.50322089 154.0690993 -162.68158781 141.23950933 -157.3125 126.8125 C-156.95414063 125.96300781 -156.59578125 125.11351562 -156.2265625 124.23828125 C-150.92114519 110.57583443 -150.52313764 94.93878212 -149.65063477 80.45727539 C-147.95656368 52.97761837 -140.00209136 27.24778404 -119.52734375 7.74609375 C-86.66535611 -20.94294308 -36.187531 -25.86861612 0 0Z"
                fill="#FFF0E6"
                transform="translate(293.3125,126.1875)"
            >
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="1;1.03;1;1.02;1"
                    additive="sum"
                    dur="2.5s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Robin Hood pointed hat -->
            <g transform="translate(244,120)">
                <!-- Hat body -->
                <polygon points="-35,14 0,-42 42,7" fill="#48BB78" />
                <!-- Hat band -->
                <path
                    d="M-35,14 C-14,20 21,17 42,7"
                    fill="none"
                    stroke="#276749"
                    stroke-width="3.5"
                />
                <!-- Feather plume -->
                <g transform="translate(30,-7) rotate(25)">
                    <path
                        d="M0,0 C4,-17 1,-35 -3,-49"
                        fill="none"
                        stroke="#ED8936"
                        stroke-width="2.8"
                        stroke-linecap="round"
                    />
                    <path
                        d="M-3,-49 C-6,-42 -1,-35 0,-28"
                        fill="none"
                        stroke="#F6AD55"
                        stroke-width="2"
                        stroke-linecap="round"
                    />
                    <!-- Feather wisps -->
                    <path
                        d="M-1,-42 C-7,-39 -4,-34 0,-31"
                        fill="none"
                        stroke="#ED8936"
                        stroke-width="1.4"
                        opacity="0.7"
                    />
                    <path
                        d="M0,-35 C6,-32 3,-27 -1,-24"
                        fill="none"
                        stroke="#F6AD55"
                        stroke-width="1.4"
                        opacity="0.6"
                    />
                </g>
            </g>

            <!-- Quiver with heart-tipped arrows (behind right side) -->
            <g transform="translate(330,195) rotate(-10)">
                <!-- Quiver body -->
                <rect
                    x="-7"
                    y="-35"
                    width="14"
                    height="56"
                    rx="4"
                    fill="#8B4513"
                    opacity="0.8"
                />
                <rect x="-7" y="-35" width="14" height="8" rx="4" fill="#A0522D" />
                <!-- Arrow shafts poking out -->
                <line
                    x1="-3"
                    y1="-35"
                    x2="-5"
                    y2="-59"
                    stroke="#D2B48C"
                    stroke-width="2"
                />
                <line
                    x1="3"
                    y1="-35"
                    x2="4"
                    y2="-62"
                    stroke="#D2B48C"
                    stroke-width="2"
                />
                <line
                    x1="0"
                    y1="-35"
                    x2="-1"
                    y2="-65"
                    stroke="#D2B48C"
                    stroke-width="2"
                />
                <!-- Heart-shaped arrowheads -->
                <path
                    d="M0,1 C0,0 -0.8,-0.8 -1.5,-0.8 C-2.2,-0.8 -3,0 -3,1 C-3,2.5 0,4 0,4 C0,4 3,2.5 3,1 C3,0 2.2,-0.8 1.5,-0.8 C0.8,-0.8 0,0 0,1Z"
                    fill="#FF5CA9"
                    transform="translate(-5,-62) scale(1)"
                />
                <path
                    d="M0,1 C0,0 -0.8,-0.8 -1.5,-0.8 C-2.2,-0.8 -3,0 -3,1 C-3,2.5 0,4 0,4 C0,4 3,2.5 3,1 C3,0 2.2,-0.8 1.5,-0.8 C0.8,-0.8 0,0 0,1Z"
                    fill="#E53E3E"
                    transform="translate(4,-65) scale(1)"
                />
                <path
                    d="M0,1 C0,0 -0.8,-0.8 -1.5,-0.8 C-2.2,-0.8 -3,0 -3,1 C-3,2.5 0,4 0,4 C0,4 3,2.5 3,1 C3,0 2.2,-0.8 1.5,-0.8 C0.8,-0.8 0,0 0,1Z"
                    fill="#FF5CA9"
                    transform="translate(-1,-68) scale(1)"
                />
            </g>

            <!-- Glowing compass star rotating above -->
            <g transform="translate(290,90)">
                <animateTransform
                    attributeName="transform"
                    type="rotate"
                    values="0 290 90;360 290 90"
                    dur="10s"
                    repeatCount="indefinite"
                />
                <!-- Four-point star -->
                <polygon
                    points="0,-18 4,-4 18,0 4,4 0,18 -4,4 -18,0 -4,-4"
                    fill="#FFD700"
                    opacity="0.8"
                >
                    <animate
                        attributeName="opacity"
                        values="0.5;1;0.5"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </polygon>
                <!-- Inner glow -->
                <circle cx="0" cy="0" r="6" fill="#FFF" opacity="0.4">
                    <animate
                        attributeName="opacity"
                        values="0.2;0.5;0.2"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </circle>
            </g>

            <!-- Left eye - bright, looking up -->
            <g transform="translate(205,185)">
                <circle cx="0" cy="0" r="10" fill="#27183f" />
                <circle cx="1" cy="-3" r="4" fill="#FFF" opacity="0.9" />
                <circle cx="3" cy="-5" r="2" fill="#FFF" opacity="0.6" />
            </g>

            <!-- Right eye - bright, looking up -->
            <g transform="translate(278,185)">
                <circle cx="0" cy="0" r="10" fill="#27183f" />
                <circle cx="1" cy="-3" r="4" fill="#FFF" opacity="0.9" />
                <circle cx="3" cy="-5" r="2" fill="#FFF" opacity="0.6" />
            </g>

            <!-- Rosy cheeks -->
            <ellipse cx="185" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
                <animate
                    attributeName="opacity"
                    values="0.3;0.5;0.3"
                    dur="2s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="300" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
                <animate
                    attributeName="opacity"
                    values="0.3;0.5;0.3"
                    dur="2s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </ellipse>

            <!-- Mouth - excited wide grin -->
            <path
                d="M216,242 Q248,272 280,242"
                fill="#27183f"
                stroke="#27183f"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M216,242 Q248,272 280,242;M214,242 Q248,276 282,242;M216,242 Q248,272 280,242"
                    dur="3s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Sagittarius zodiac symbol -->
            <g transform="translate(365,135)">
                <text
                    font-family="serif"
                    font-size="20"
                    fill="#FF6B35"
                    text-anchor="middle"
                    dominant-baseline="central"
                >
                    &#x2650;
                </text>
                <animate
                    attributeName="opacity"
                    values="0.5;1;0.5"
                    dur="2.5s"
                    repeatCount="indefinite"
                />
            </g>

            <!-- Stardust trail -->
            <circle cx="155" cy="180" r="2.5" fill="#FFD700" opacity="0.6">
                <animate
                    attributeName="opacity"
                    values="0;0.8;0"
                    dur="2s"
                    repeatCount="indefinite"
                />
            </circle>
            <circle cx="148" cy="195" r="2" fill="#F6AD55" opacity="0.5">
                <animate
                    attributeName="opacity"
                    values="0;0.6;0"
                    dur="2.5s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </circle>
            <circle cx="152" cy="210" r="2.5" fill="#FFD700" opacity="0.4">
                <animate
                    attributeName="opacity"
                    values="0;0.7;0"
                    dur="1.8s"
                    repeatCount="indefinite"
                    begin="0.8s"
                />
            </circle>
            <circle cx="146" cy="165" r="2" fill="#ECC94B" opacity="0.5">
                <animate
                    attributeName="opacity"
                    values="0;0.6;0"
                    dur="2.2s"
                    repeatCount="indefinite"
                    begin="1.2s"
                />
            </circle>

            <!-- Sparkle -->
            <path
                d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1Z"
                fill="#FFD700"
                transform="translate(390,175)"
            >
                <animate
                    attributeName="opacity"
                    values="0;1;0"
                    dur="1.5s"
                    repeatCount="indefinite"
                />
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="0.5;1.2;0.5"
                    dur="1.5s"
                    repeatCount="indefinite"
                    additive="sum"
                />
            </path>
        </g>
    </g>
</svg>
