<svg xmlns="http://www.w3.org/2000/svg" viewBox="89 75 318 325" class="{{ class|default:'w-7 h-7' }}" aria-hidden="true">
  {# Ghost Story - Gemini Ghost: The Trickster Mirror Spirits — comedy/tragedy masks, floating playing cards, pop-up speech symbols #}

  <g>
    <!-- Lively float -->
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 -10;0 -3;0 -8;0 0"
      dur="2.8s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <g>
      <!-- Quick sway -->
      <animateTransform attributeName="transform" type="rotate"
        values="0 248 230;-3 248 230;0 248 230;3 248 230;0 248 230"
        dur="2.8s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

        <animateTransform attributeName="transform" type="scale"
          values="1;1.03;1;1.01;1" additive="sum"
          dur="2.8s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Comedy mask (left, happy) floating on stick -->
      <g transform="translate(148,170)">
        <animateTransform attributeName="transform" type="translate"
          values="148 170;148 167;148 170" dur="3s" repeatCount="indefinite"/>
        <!-- Stick -->
        <line x1="0" y1="18" x2="0" y2="45" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
        <!-- Mask face -->
        <ellipse cx="0" cy="0" rx="18" ry="15" fill="#ECC94B"/>
        <!-- Happy eyes -->
        <path d="M-8,-3 C-6,-6.5 -3,-6.5 -1.5,-3" fill="none" stroke="#27183f" stroke-width="2"/>
        <path d="M1.5,-3 C3,-6.5 6,-6.5 8,-3" fill="none" stroke="#27183f" stroke-width="2"/>
        <!-- Happy mouth -->
        <path d="M-7,4 Q0,12 7,4" fill="none" stroke="#27183f" stroke-width="2"/>
      </g>

      <!-- Tragedy mask (right, sad) floating on stick -->
      <g transform="translate(345,175)">
        <animateTransform attributeName="transform" type="translate"
          values="345 175;345 172;345 175" dur="3s" repeatCount="indefinite" begin="0.5s"/>
        <!-- Stick -->
        <line x1="0" y1="18" x2="0" y2="45" stroke="#8B4513" stroke-width="3" stroke-linecap="round"/>
        <!-- Mask face -->
        <ellipse cx="0" cy="0" rx="18" ry="15" fill="#C084FC"/>
        <!-- Sad eyes -->
        <path d="M-8,-3 C-6,0 -3,0 -1.5,-3" fill="none" stroke="#27183f" stroke-width="2"/>
        <path d="M1.5,-3 C3,0 6,0 8,-3" fill="none" stroke="#27183f" stroke-width="2"/>
        <!-- Sad mouth -->
        <path d="M-6,7 Q0,2 6,7" fill="none" stroke="#27183f" stroke-width="2"/>
      </g>

      <!-- Floating playing cards orbiting -->
      <g transform="translate(340,130)">
        <animateTransform attributeName="transform" type="rotate"
          values="0 244 200;360 244 200" dur="12s" repeatCount="indefinite"/>
        <!-- Card 1 (heart) -->
        <g transform="rotate(15)">
          <rect x="-7.5" y="-10.5" width="15" height="21" rx="1.5" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
          <path d="M0,0 C0,-0.5 -0.5,-1 -1,-1 C-1.5,-1 -2,-0.5 -2,0 C-2,1 0,2 0,2 C0,2 2,1 2,0 C2,-0.5 1.5,-1 1,-1 C0.5,-1 0,-0.5 0,0Z" fill="#E53E3E" transform="scale(2.25)"/>
        </g>
      </g>
      <g transform="translate(150,135)">
        <animateTransform attributeName="transform" type="rotate"
          values="180 244 200;540 244 200" dur="12s" repeatCount="indefinite"/>
        <!-- Card 2 (star/diamond) -->
        <g transform="rotate(-10)">
          <rect x="-7.5" y="-10.5" width="15" height="21" rx="1.5" fill="#FFF" stroke="#E2E8F0" stroke-width="0.5"/>
          <polygon points="0,-4.5 2.25,0 0,4.5 -2.25,0" fill="#4299E1" transform="scale(1.3)"/>
        </g>
      </g>

      <!-- Pop-up speech symbols -->
      <g transform="translate(300,140)">
        <!-- Heart symbol -->
        <path d="M0,1 C0,0.3 -0.6,-0.3 -1.2,-0.3 C-1.8,-0.3 -2.4,0.3 -2.4,1 C-2.4,2 0,3.2 0,3.2 C0,3.2 2.4,2 2.4,1 C2.4,0.3 1.8,-0.3 1.2,-0.3 C0.6,-0.3 0,0.3 0,1Z" fill="#FF5CA9" transform="scale(2.25)">
          <animate attributeName="opacity" values="0;0.8;0;0;0" dur="4s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate"
            values="0 0;0 -8;0 -15" dur="4s" repeatCount="indefinite"/>
        </path>
      </g>
      <g transform="translate(190,135)">
        <!-- Star symbol -->
        <polygon points="0,-6 1.8,-1.8 6,0 1.8,1.8 0,6 -1.8,1.8 -6,0 -1.8,-1.8" fill="#ECC94B">
          <animate attributeName="opacity" values="0;0;0.8;0;0" dur="4s" repeatCount="indefinite"/>
          <animateTransform attributeName="transform" type="translate"
            values="0 0;0 -6;0 -12" dur="4s" repeatCount="indefinite"/>
        </polygon>
      </g>
      <g transform="translate(250,130)">
        <!-- Exclamation -->
        <text font-family="sans-serif" font-size="15" fill="#4299E1" text-anchor="middle" dominant-baseline="central">!</text>
        <animate attributeName="opacity" values="0;0;0;0.8;0" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate"
          values="0 0;0 -5;0 -10" dur="4s" repeatCount="indefinite"/>
      </g>

      <!-- Left eye - curious, mischievous shifting -->
      <g transform="translate(205,188)">
        <circle cx="0" cy="0" r="9" fill="#27183f"/>
        <circle cx="0" cy="-1" r="3.5" fill="#FFF" opacity="0.9">
          <animate attributeName="cx" values="-2;3;-2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <!-- One eyebrow slightly higher (mischief) -->
        <line x1="-10" y1="-14" x2="6" y2="-12" stroke="#27183f" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Right eye - curious, mischievous shifting -->
      <g transform="translate(278,188)">
        <circle cx="0" cy="0" r="9" fill="#27183f"/>
        <circle cx="0" cy="-1" r="3.5" fill="#FFF" opacity="0.9">
          <animate attributeName="cx" values="-2;3;-2" dur="3s" repeatCount="indefinite"/>
        </circle>
        <line x1="-6" y1="-11" x2="10" y2="-13" stroke="#27183f" stroke-width="2" stroke-linecap="round"/>
      </g>

      <!-- Rosy cheeks -->
      <ellipse cx="185" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>
      </ellipse>
      <ellipse cx="300" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite" begin="0.4s"/>
      </ellipse>

      <!-- Mouth - chatty animated smile -->
      <path d="M220,242 Q244,268 268,242" fill="#27183f" stroke="#27183f" stroke-width="1">
        <animate attributeName="d"
          values="M220,242 Q244,268 268,242;M220,244 Q244,260 268,244;M220,242 Q244,268 268,242"
          dur="2s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Gemini zodiac symbol -->
      <g transform="translate(244,100)">
        <text font-family="serif" font-size="20" fill="#7B9FD4" text-anchor="middle" dominant-baseline="central">&#x264A;</text>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>
      </g>

      <!-- Air sparkle -->
      <path d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z" fill="#C084FC" transform="translate(310,110)">
        <animate attributeName="opacity" values="0;0.8;0" dur="2s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale"
          values="0.5;1.2;0.5" dur="2s" repeatCount="indefinite" additive="sum"/>
      </path>

    </g>
  </g>
</svg>
