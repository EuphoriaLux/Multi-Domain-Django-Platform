<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="89 75 318 325"
    class="{{ class|default:'w-7 h-7' }}"
    aria-hidden="true"
>
    {# Ghost Story - Taurus Ghost: The Enchanted Garden Keeper — rose flower crown with
    tiny horns, golden key, drifting petals #}

    <g>
        <!-- Steady slow float -->
        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -7;0 -2;0 -5;0 0"
            dur="4s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        />

        <g>
            <!-- Gentle sway -->
            <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 248 230;-2 248 230;0 248 230;2 248 230;0 248 230"
                dur="4s"
                repeatCount="indefinite"
                calcMode="spline"
                keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
            />

6535611 -20.94294308 -36.187531 -25.86861612 0 0Z"
                fill="#F0F5E8"
                transform="translate(293.3125,126.1875)"
            >
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="1;1.02;1;1.01;1"
                    additive="sum"
                    dur="3.5s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Rose flower crown with tiny horns (~1.3x scaled up) -->
            <g transform="translate(244,130)">
                <!-- Vine band (wider) -->
                <path
                    d="M-45,0 C-32,-5 -13,-8 0,-7 C13,-8 32,-5 45,0"
                    fill="none"
                    stroke="#48BB78"
                    stroke-width="2.5"
                />
                <!-- Leaves along vine (bigger) -->
                <ellipse
                    cx="-25"
                    cy="-3"
                    rx="6"
                    ry="3"
                    fill="#68D391"
                    transform="rotate(-10)"
                />
                <ellipse
                    cx="25"
                    cy="-3"
                    rx="6"
                    ry="3"
                    fill="#68D391"
                    transform="rotate(10)"
                />
                <ellipse cx="0" cy="-5" rx="5" ry="2.5" fill="#48BB78" />
                <!-- Rose 1 (center, large) -->
                <g transform="translate(0,-10)">
                    <circle cx="0" cy="0" r="8" fill="#F687B3" />
                    <circle cx="0" cy="0" r="5" fill="#FBB6CE" />
                    <circle cx="0" cy="0" r="2" fill="#FED7E2" />
                </g>
                <!-- Rose 2 (left) -->
                <g transform="translate(-22,-5)">
                    <circle cx="0" cy="0" r="7" fill="#E53E3E" opacity="0.9" />
                    <circle cx="0" cy="0" r="4" fill="#FC8181" />
                    <circle cx="0" cy="0" r="1.5" fill="#FEB2B2" />
                </g>
                <!-- Rose 3 (right) -->
                <g transform="translate(22,-5)">
                    <circle cx="0" cy="0" r="7" fill="#F687B3" opacity="0.9" />
                    <circle cx="0" cy="0" r="4" fill="#FBB6CE" />
                    <circle cx="0" cy="0" r="1.5" fill="#FED7E2" />
                </g>
                <!-- Horns peeking through flowers (more prominent) -->
                <path
                    d="M-36,3 C-39,-6 -44,-12 -38,-4"
                    fill="#6B8E23"
                    stroke="#556B2F"
                    stroke-width="1.2"
                    opacity="0.7"
                />
                <path
                    d="M36,3 C39,-6 44,-12 38,-4"
                    fill="#6B8E23"
                    stroke="#556B2F"
                    stroke-width="1.2"
                    opacity="0.7"
                />
            </g>

            <!-- Golden key (secret garden) hanging to the right (~1.5x scaled up) -->
            <g transform="translate(340,240) rotate(15)">
                <!-- Key bow (ornate circle top) -->
                <circle
                    cx="0"
                    cy="-18"
                    r="10"
                    fill="none"
                    stroke="#ECC94B"
                    stroke-width="3"
                />
                <circle cx="0" cy="-18" r="4.5" fill="#ECC94B" opacity="0.3" />
                <!-- Key shaft -->
                <rect x="-2" y="-8" width="4" height="33" rx="1.5" fill="#ECC94B" />
                <!-- Key teeth -->
                <rect x="2" y="18" width="7.5" height="3.5" rx="0.8" fill="#D69E2E" />
                <rect x="2" y="12" width="6" height="3" rx="0.8" fill="#D69E2E" />
                <!-- Key glow -->
                <circle cx="0" cy="0" r="18" fill="#FFD700" opacity="0.08">
                    <animate
                        attributeName="opacity"
                        values="0.05;0.15;0.05"
                        dur="3s"
                        repeatCount="indefinite"
                    />
                </circle>
            </g>

            <!-- Left eye - serene, blissful -->
            <g transform="translate(205,188)">
                <circle cx="0" cy="0" r="8" fill="#27183f" />
                <circle cx="1.5" cy="-1.5" r="3" fill="#FFF" opacity="0.9" />
                <circle cx="2.5" cy="-2.5" r="1.5" fill="#FFF" opacity="0.5" />
            </g>

            <!-- Right eye - serene, blissful -->
            <g transform="translate(278,188)">
                <circle cx="0" cy="0" r="8" fill="#27183f" />
                <circle cx="1.5" cy="-1.5" r="3" fill="#FFF" opacity="0.9" />
                <circle cx="2.5" cy="-2.5" r="1.5" fill="#FFF" opacity="0.5" />
            </g>

            <!-- Deeply rosy cheeks -->
            <ellipse cx="185" cy="218" rx="15" ry="9" fill="#FBB6CE" opacity="0.45">
                <animate
                    attributeName="opacity"
                    values="0.3;0.55;0.3"
                    dur="2.5s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="300" cy="218" rx="15" ry="9" fill="#FBB6CE" opacity="0.45">
                <animate
                    attributeName="opacity"
                    values="0.3;0.55;0.3"
                    dur="2.5s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </ellipse>

            <!-- Mouth - content gentle smile -->
            <path
                d="M222,244 Q244,264 266,244"
                fill="#27183f"
                stroke="#27183f"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M222,244 Q244,264 266,244;M221,244 Q244,266 267,244;M222,244 Q244,264 266,244"
                    dur="4s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Drifting petals (bigger) -->
            <g>
                <ellipse
                    cx="350"
                    cy="140"
                    rx="6"
                    ry="4"
                    fill="#FBB6CE"
                    opacity="0.7"
                    transform="rotate(30)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="350 140;345 175;338 210"
                        dur="5s"
                        repeatCount="indefinite"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.7;0.5;0"
                        dur="5s"
                        repeatCount="indefinite"
                    />
                    <animateTransform
                        attributeName="transform"
                        type="rotate"
                        values="30;60;90"
                        dur="5s"
                        repeatCount="indefinite"
                        additive="sum"
                    />
                </ellipse>
            </g>
            <g>
                <ellipse
                    cx="150"
                    cy="155"
                    rx="5"
                    ry="3"
                    fill="#F687B3"
                    opacity="0.6"
                    transform="rotate(-20)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="150 155;155 190;160 225"
                        dur="6s"
                        repeatCount="indefinite"
                        begin="1.5s"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.6;0.4;0"
                        dur="6s"
                        repeatCount="indefinite"
                        begin="1.5s"
                    />
                </ellipse>
            </g>
            <g>
                <ellipse
                    cx="310"
                    cy="120"
                    rx="5"
                    ry="3"
                    fill="#FED7E2"
                    opacity="0.5"
                    transform="rotate(45)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="310 120;305 160;298 200"
                        dur="5.5s"
                        repeatCount="indefinite"
                        begin="3s"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.5;0.3;0"
                        dur="5.5s"
                        repeatCount="indefinite"
                        begin="3s"
                    />
                </ellipse>
            </g>

            <!-- Taurus zodiac symbol -->
            <g transform="translate(150,120)">
                <text
                    font-family="serif"
                    font-size="20"
                    fill="#6B8E23"
                    text-anchor="middle"
                    dominant-baseline="central"
                >
                    &#x2649;
                </text>
                <animate
                    attributeName="opacity"
                    values="0.5;1;0.5"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </g>

            <!-- Nature sparkle -->
            <path
                d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z"
                fill="#68D391"
                transform="translate(365,200)"
            >
                <animate
                    attributeName="opacity"
                    values="0;0.7;0"
                    dur="2.5s"
                    repeatCount="indefinite"
                />
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="0.5;1.1;0.5"
                    dur="2.5s"
                    repeatCount="indefinite"
                    additive="sum"
                />
            </path>
        </g>
    </g>
</svg>
