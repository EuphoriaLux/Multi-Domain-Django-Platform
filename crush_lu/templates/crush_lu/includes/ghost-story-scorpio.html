<svg

    viewBox="89 75 318 325"
    class="{{ class|default:'w-7 h-7' }}"
    aria-hidden="true"
>
    {# Ghost Story - Scorpio Ghost: The Dark Fairy Sorceress — mysterious hooded cloak,
    glowing potion vial, dark rose, brief eye glow #}

    <g>
        <!-- Slow deliberate float -->
        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -7;0 -2;0 -5;0 0"
            dur="4s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        />

        <g>
            <!-- Mysterious sway -->
            <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 248 230;-2 248 230;0 248 230;2 248 230;0 248 230"
                dur="4s"
                repeatCount="indefinite"
                calcMode="spline"
                keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"

                    fill="#1A202C"
                    opacity="0.6"
                >
                    <animate
                        attributeName="opacity"
                        values="0.5;0.65;0.5"
                        dur="4s"
                        repeatCount="indefinite"
                    />
                </path>
                <!-- Cloak drape left -->
                <path
                    d="M-58,32 C-65,78 -62,130 -46,170"
                    fill="none"
                    stroke="#2D3748"
                    stroke-width="2.5"
                    opacity="0.5"
                >
                    <animate
                        attributeName="d"
                        values="M-58,32 C-65,78 -62,130 -46,170;M-58,32 C-68,85 -65,137 -48,176;M-58,32 C-65,78 -62,130 -46,170"
                        dur="5s"
                        repeatCount="indefinite"
                    />
                </path>
                <!-- Cloak drape right -->
                <path
                    d="M58,32 C65,78 62,130 46,170"
                    fill="none"
                    stroke="#2D3748"
                    stroke-width="2.5"
                    opacity="0.5"
                >
                    <animate
                        attributeName="d"
                        values="M58,32 C65,78 62,130 46,170;M58,32 C68,85 65,137 48,176;M58,32 C65,78 62,130 46,170"

            >

                    attributeName="transform"
                    type="scale"
                    values="1;1.02;1;1.01;1"
                    additive="sum"
                    dur="3.5s"

            <!-- Glowing potion vial (right side, ~1.5x) -->
            <g transform="translate(340,225)">

                    attributeName="transform"
                    type="translate"
                    values="340 225;340 222;340 225"
                    dur="3s"

                />

                <path
                    d="M-8,-15 L-8,12 C-8,21 8,21 8,12 L8,-15 Z"

                    d="M-8,-15 L-8,12 C-8,21 8,21 8,12 L8,-15 Z"
                    fill="none"
                    stroke="#805AD5"
                    stroke-width="1.5"
                />

                    y="-24"
                    width="10"
                    height="9"
                    rx="1.5"
                    fill="#805AD5"
                    opacity="0.5"

                <circle cx="-1.5" cy="6" r="2.5" fill="#C084FC" opacity="0.6">

                        attributeName="cy"
                        values="6;-3;-12"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                    <animate

                        values="0.6;0.3;0"

                        attributeName="cy"
                        values="9;0;-9"

                    />
                    <animate
                        attributeName="opacity"
                        values="0.5;0.2;0"
                        dur="2.5s"
                        repeatCount="indefinite"

                    />

                <!-- Potion wisps -->
                <path
                    d="M0,-29 C-4,-36 3,-42 -1,-48"
                    fill="none"
                    stroke="#C084FC"
                    stroke-width="1.5"
                    opacity="0.3"
                >
                    <animate
                        attributeName="opacity"
                        values="0.1;0.4;0.1"
                        dur="3s"
                        repeatCount="indefinite"
                    />
                </path>
                <!-- Vial glow -->
                <circle cx="0" cy="0" r="18" fill="#805AD5" opacity="0.06">
                    <animate
                        attributeName="opacity"
                        values="0.03;0.1;0.03"
                        dur="3s"
                        repeatCount="indefinite"
                    />
                </circle>
            </g>

            <!-- Dark rose (left side, ~1.4x) -->
            <g transform="translate(152,250) rotate(-15)">
                <!-- Stem -->
                <line x1="0" y1="0" x2="0" y2="28" stroke="#276749" stroke-width="2" />
                <!-- Thorn -->
                <line
                    x1="0"
                    y1="14"
                    x2="5"
                    y2="10"
                    stroke="#276749"
                    stroke-width="1.5"
                />
                <!-- Leaf -->
                <ellipse
                    cx="-6"
                    cy="21"
                    rx="6"
                    ry="3"
                    fill="#276749"
                    transform="rotate(-20)"
                />
                <!-- Dark rose bloom -->
                <circle cx="0" cy="-4" r="9" fill="#9B2C2C" />
                <circle cx="0" cy="-4" r="5" fill="#C53030" />
                <circle cx="0" cy="-4" r="2.5" fill="#E53E3E" opacity="0.7" />
            </g>

            <!-- Left eye - intense, piercing with brief glow -->
            <g transform="translate(205,188)">
                <ellipse cx="0" cy="0" rx="10" ry="6" fill="#1a0e2e" />
                <circle cx="2" cy="-1" r="2.5" fill="#FFF" opacity="0.9" />
                <!-- Brief eye glow flash -->
                <ellipse cx="0" cy="0" rx="10" ry="6" fill="#805AD5" opacity="0">
                    <animate
                        attributeName="opacity"
                        values="0;0;0;0.3;0;0;0;0;0;0"
                        dur="6s"
                        repeatCount="indefinite"
                    />
                </ellipse>
                <line
                    x1="-12"
                    y1="-11"
                    x2="5"
                    y2="-8"
                    stroke="#1a0e2e"
                    stroke-width="2.5"
                    stroke-linecap="round"
                />

            <!-- Right eye - intense, piercing with brief glow -->
            <g transform="translate(278,188)">
                <ellipse cx="0" cy="0" rx="10" ry="6" fill="#1a0e2e" />
                <circle cx="2" cy="-1" r="2.5" fill="#FFF" opacity="0.9" />
                <ellipse cx="0" cy="0" rx="10" ry="6" fill="#805AD5" opacity="0">
                    <animate
                        attributeName="opacity"
                        values="0;0;0;0.3;0;0;0;0;0;0"
                        dur="6s"
                        repeatCount="indefinite"
                    />
                </ellipse>
                <line
                    x1="-5"
                    y1="-8"
                    x2="12"
                    y2="-11"
                    stroke="#1a0e2e"
                    stroke-width="2.5"
                    stroke-linecap="round"
                />
            </g>

            <!-- Subtle dark cheeks -->
            <ellipse cx="185" cy="216" rx="12" ry="7" fill="#FBB6CE" opacity="0.25">
                <animate
                    attributeName="opacity"
                    values="0.15;0.3;0.15"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="300" cy="216" rx="12" ry="7" fill="#FBB6CE" opacity="0.25">
                <animate
                    attributeName="opacity"
                    values="0.15;0.3;0.15"
                    dur="3s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </ellipse>

            <!-- Mouth - mysterious knowing smirk (asymmetric) -->
            <path
                d="M225,244 Q248,260 270,240"
                fill="#1a0e2e"
                stroke="#1a0e2e"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M225,244 Q248,260 270,240;M224,244 Q248,262 271,240;M225,244 Q248,260 270,240"
                    dur="4s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Dark fairy sparkles (deep purple/crimson, bigger) -->
            <circle cx="350" cy="180" r="4.5" fill="#553C9A" opacity="0.12">
                <animate
                    attributeName="opacity"
                    values="0.05;0.18;0.05"
                    dur="3s"
                    repeatCount="indefinite"
                />
                <animate
                    attributeName="r"
                    values="3;6;3"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </circle>
            <circle cx="145" cy="195" r="4" fill="#9B2C2C" opacity="0.1">
                <animate
                    attributeName="opacity"
                    values="0.05;0.15;0.05"
                    dur="4s"
                    repeatCount="indefinite"
                    begin="1s"
                />
                <animate
                    attributeName="r"
                    values="3;6;3"
                    dur="4s"
                    repeatCount="indefinite"
                    begin="1s"
                />
            </circle>
            <circle cx="340" cy="150" r="3" fill="#805AD5" opacity="0.1">
                <animate
                    attributeName="opacity"
                    values="0.03;0.14;0.03"
                    dur="3.5s"
                    repeatCount="indefinite"
                    begin="0.5s"
                />
                <animate
                    attributeName="r"
                    values="2.5;5.5;2.5"
                    dur="3.5s"
                    repeatCount="indefinite"
                    begin="0.5s"
                />
            </circle>

            <!-- Scorpio zodiac symbol -->
            <g transform="translate(365,140)">
                <text
                    font-family="serif"
                    font-size="20"
                    fill="#805AD5"
                    text-anchor="middle"
                    dominant-baseline="central"
                >
                    &#x264F;
                </text>
                <animate
                    attributeName="opacity"
                    values="0.5;1;0.5"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </g>
        </g>
    </g>
</svg>
