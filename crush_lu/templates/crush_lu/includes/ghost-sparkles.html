{% comment %}
Sparkle particles around the ghost (shared by animated + hero logo variants).
{% endcomment %}
<!-- Sparkle 1 - top right -->
<circle cx="350" cy="140" r="3" fill="#FFD700">
  <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite"/>
  <animate attributeName="r" values="1;4;1" dur="2s" repeatCount="indefinite"/>
  <animateTransform attributeName="transform" type="translate"
    values="0 0;8 -10;0 0" dur="2s" repeatCount="indefinite"/>
</circle>
<!-- Sparkle 2 - left -->
<circle cx="145" cy="180" r="2.5" fill="#FFD700">
  <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  <animate attributeName="r" values="1;3.5;1" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
  <animateTransform attributeName="transform" type="translate"
    values="0 0;-6 -8;0 0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
</circle>
<!-- Sparkle 3 - bottom right -->
<circle cx="370" cy="280" r="2" fill="#FF5CA9">
  <animate attributeName="opacity" values="0;0.8;0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  <animate attributeName="r" values="1;3;1" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
  <animateTransform attributeName="transform" type="translate"
    values="0 0;10 5;0 0" dur="1.8s" repeatCount="indefinite" begin="0.4s"/>
</circle>
<!-- Sparkle 4 - top left -->
<circle cx="160" cy="130" r="2" fill="#C084FC">
  <animate attributeName="opacity" values="0;0.9;0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
  <animate attributeName="r" values="1;3;1" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
  <animateTransform attributeName="transform" type="translate"
    values="0 0;-5 -12;0 0" dur="2.2s" repeatCount="indefinite" begin="1.2s"/>
</circle>
