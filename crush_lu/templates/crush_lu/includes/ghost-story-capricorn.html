<svg
    xmlns="http://www.w3.org/2000/svg"
    viewBox="89 75 318 325"
    class="{{ class|default:'w-7 h-7' }}"
    aria-hidden="true"
>
    {# Ghost Story - Capricorn Ghost: The Mountain Castle Builder — geometric circlet
    crown, glowing castle tower, silver snowflakes, determined eyes #}

    <g>
        <!-- Steady determined float -->
        <animateTransform
            attributeName="transform"
            type="translate"
            values="0 0;0 -8;0 -2;0 -6;0 0"
            dur="3.5s"
            repeatCount="indefinite"
            calcMode="spline"
            keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
        />

        <g>
            <!-- Steady sway -->
            <animateTransform
                attributeName="transform"
                type="rotate"
                values="0 248 230;-2 248 230;0 248 230;2 248 230;0 248 230"
                dur="3.5s"
                repeatCount="indefinite"
                calcMode="spline"
                keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
            />

            <!-- Ghost body - earth element soft sage -->
            <path
                d="M0 0 C20.10256691 16.26024803 34.87819428 37.57947896 38.1875 63.76953125 C38.46074249 68.12006401 38.59879554 72.45510272 38.6875 76.8125 C39.49397619 108.73115191 42.19992181 139.06430556 66.3359375 162.734375 C70.00595213 165.97764375 73.95948905 168.8070311 77.953125 171.63671875 C82.9917218 175.64600221 85.36027289 179.29625985 86.48828125 185.546875 C86.87339201 189.92656604 85.95121208 193.0673738 83.375 196.625 C77.90943725 202.72120461 70.88920791 205.2992975 63.3359375 208.01953125 C50.85398343 212.53885945 45.98921795 218.32090001 39.01953125 229.25390625 C33.70859595 237.46871692 27.49316695 242.9501775 17.75 245.25 C10.388348 246.38875554 3.34927772 245.1730557 -3.875 243.6875 C-10.12959473 242.53978632 -15.95813152 241.87814751 -21.65625 245.1640625 C-25.54523688 248.08080266 -28.92792527 251.39678091 -32.3125 254.875 C-40.66120582 263.40519942 -50.43310595 268.95599728 -62.5 269.25 C-73.76530721 268.87286769 -82.79467839 262.91379118 -90.50390625 254.9375 C-92.75099008 252.29729783 -94.73016862 249.50490583 -96.75 246.6875 C-101.32320213 240.49429915 -105.56878234 236.26373689 -113.3125 234.875 C-116.79371116 234.61863174 -119.69589039 235.36413376 -123.0546875 236.3125 C-130.93101016 238.05673754 -138.12014382 237.43490546 -145.13671875 233.40625 C-151.75307285 228.55980032 -154.82181713 221.11947486 -158.2109375 213.86328125 C-163.63290399 205.99235963 -172.98560762 204.06453593 -181.7109375 201.49609375 C-188.522037 199.37992844 -193.06039335 197.11558975 -197.1875 191.0625 C-199.03855323 185.71501288 -199.07285512 181.04883859 -197.25 175.6875 C-193.32438105 169.86238801 -188.78887337 165.98205892 -182.8125 162.3125 C-169.50322089 154.0690993 -162.68158781 141.23950933 -157.3125 126.8125 C-156.95414063 125.96300781 -156.59578125 125.11351562 -156.2265625 124.23828125 C-150.92114519 110.57583443 -150.52313764 94.93878212 -149.65063477 80.45727539 C-147.95656368 52.97761837 -140.00209136 27.24778404 -119.52734375 7.74609375 C-86.6                 fill="#F0F5E8"
                transform="translate(293.3125,126.1875)"
            >
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="1;1.02;1;1.01;1"
                    additive="sum"
                    dur="3s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Structured geometric circlet crown with goat horns -->
            <g transform="translate(244,128)">
                <!-- Circlet band -->
                <rect x="-40" y="-4" width="80" height="10" rx="3" fill="#CBD5E0" />
                <!-- Geometric peaked elements -->
                <polygon points="-26,-4 -20,-16 -14,-4" fill="#A0AEC0" />
                <polygon points="-6,-4 0,-21 6,-4" fill="#CBD5E0" />
                <polygon points="14,-4 20,-16 26,-4" fill="#A0AEC0" />
                <!-- Central emerald -->
                <rect
                    x="-4"
                    y="-16"
                    width="8"
                    height="8"
                    rx="1"
                    fill="#48BB78"
                    transform="rotate(45 0 -12)"
                >
                    <animate
                        attributeName="opacity"
                        values="0.7;1;0.7"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </rect>
                <!-- Small goat horns curving backward from circlet -->
                <path
                    d="M-33,-4 C-37,-14 -42,-24 -37,-33 C-33,-37 -29,-32 -29,-24"
                    fill="#556B2F"
                    stroke="#3E5620"
                    stroke-width="1"
                />
                <path
                    d="M33,-4 C37,-14 42,-24 37,-33 C33,-37 29,-32 29,-24"
                    fill="#556B2F"
                    stroke="#3E5620"
                    stroke-width="1"
                />
            </g>

            <!-- Glowing castle tower (right side) -->
            <g transform="translate(350,310)">
                <!-- Tower body -->
                <rect
                    x="-15"
                    y="-65"
                    width="30"
                    height="65"
                    rx="1"
                    fill="#556B2F"
                    opacity="0.7"
                />
                <!-- Tower roof (cone) -->
                <polygon points="-18,-65 0,-88 18,-65" fill="#9B2C2C" opacity="0.7" />
                <!-- Lit windows (glowing) -->
                <rect
                    x="-5"
                    y="-56"
                    width="7"
                    height="9"
                    rx="0.5"
                    fill="#ECC94B"
                    opacity="0.7"
                >
                    <animate
                        attributeName="opacity"
                        values="0.5;0.9;0.5"
                        dur="3s"
                        repeatCount="indefinite"
                    />
                </rect>
                <rect
                    x="-5"
                    y="-37"
                    width="7"
                    height="9"
                    rx="0.5"
                    fill="#ECC94B"
                    opacity="0.6"
                >
                    <animate
                        attributeName="opacity"
                        values="0.4;0.8;0.4"
                        dur="3.5s"
                        repeatCount="indefinite"
                        begin="0.5s"
                    />
                </rect>
                <!-- Tower door -->
                <path
                    d="M-5,0 L-5,-12 C-5,-18 5,-18 5,-12 L5,0 Z"
                    fill="#3E5620"
                    opacity="0.6"
                />
                <!-- Flag on top -->
                <line
                    x1="0"
                    y1="-88"
                    x2="0"
                    y2="-103"
                    stroke="#2D3748"
                    stroke-width="1.2"
                />
                <polygon points="0,-103 14,-99 0,-95" fill="#9B2C2C" opacity="0.8">
                    <animate
                        attributeName="d"
                        values="M0,-103 L14,-99 L0,-95;M0,-103 L11,-98 L0,-94;M0,-103 L14,-99 L0,-95"
                        dur="2s"
                        repeatCount="indefinite"
                    />
                </polygon>
            </g>

            <!-- Left eye - determined, composed -->
            <g transform="translate(205,188)">
                <circle cx="0" cy="0" r="8" fill="#27183f" />
                <circle cx="2" cy="-1.5" r="3" fill="#FFF" opacity="0.9" />
                <line
                    x1="-10"
                    y1="-13"
                    x2="6"
                    y2="-11"
                    stroke="#27183f"
                    stroke-width="2"
                    stroke-linecap="round"
                />
            </g>

            <!-- Right eye - determined, composed -->
            <g transform="translate(278,188)">
                <circle cx="0" cy="0" r="8" fill="#27183f" />
                <circle cx="2" cy="-1.5" r="3" fill="#FFF" opacity="0.9" />
                <line
                    x1="-6"
                    y1="-11"
                    x2="10"
                    y2="-13"
                    stroke="#27183f"
                    stroke-width="2"
                    stroke-linecap="round"
                />
            </g>

            <!-- Rosy cheeks -->
            <ellipse cx="185" cy="218" rx="13" ry="7" fill="#FF8EC6" opacity="0.35">
                <animate
                    attributeName="opacity"
                    values="0.25;0.45;0.25"
                    dur="2.5s"
                    repeatCount="indefinite"
                />
            </ellipse>
            <ellipse cx="300" cy="218" rx="13" ry="7" fill="#FF8EC6" opacity="0.35">
                <animate
                    attributeName="opacity"
                    values="0.25;0.45;0.25"
                    dur="2.5s"
                    repeatCount="indefinite"
                    begin="0.4s"
                />
            </ellipse>

            <!-- Mouth - firm but warm smile -->
            <path
                d="M222,244 Q244,264 266,244"
                fill="#27183f"
                stroke="#27183f"
                stroke-width="1"
            >
                <animate
                    attributeName="d"
                    values="M222,244 Q244,264 266,244;M221,244 Q244,266 267,244;M222,244 Q244,264 266,244"
                    dur="3.5s"
                    repeatCount="indefinite"
                    calcMode="spline"
                    keySplines="0.45 0 0.55 1;0.45 0 0.55 1"
                />
            </path>

            <!-- Drifting silver snowflakes -->
            <g>
                <path
                    d="M0,-4 L0,4 M-3.5,-2 L3.5,2 M-3.5,2 L3.5,-2"
                    fill="none"
                    stroke="#CBD5E0"
                    stroke-width="1.2"
                    opacity="0.6"
                    transform="translate(160,150)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="160 150;155 190;150 230"
                        dur="5s"
                        repeatCount="indefinite"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.6;0.4;0"
                        dur="5s"
                        repeatCount="indefinite"
                    />
                    <animateTransform
                        attributeName="transform"
                        type="rotate"
                        values="0;180;360"
                        dur="5s"
                        repeatCount="indefinite"
                        additive="sum"
                    />
                </path>
            </g>
            <g>
                <path
                    d="M0,-3.5 L0,3.5 M-3,-1.7 L3,1.7 M-3,1.7 L3,-1.7"
                    fill="none"
                    stroke="#E2E8F0"
                    stroke-width="1.1"
                    opacity="0.5"
                    transform="translate(330,140)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="330 140;325 185;320 230"
                        dur="6s"
                        repeatCount="indefinite"
                        begin="1.5s"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.5;0.3;0"
                        dur="6s"
                        repeatCount="indefinite"
                        begin="1.5s"
                    />
                </path>
            </g>
            <g>
                <path
                    d="M0,-3 L0,3 M-2.5,-1.5 L2.5,1.5 M-2.5,1.5 L2.5,-1.5"
                    fill="none"
                    stroke="#CBD5E0"
                    stroke-width="1"
                    opacity="0.4"
                    transform="translate(250,100)"
                >
                    <animateTransform
                        attributeName="transform"
                        type="translate"
                        values="250 100;248 145;245 190"
                        dur="5.5s"
                        repeatCount="indefinite"
                        begin="3s"
                    />
                    <animate
                        attributeName="opacity"
                        values="0.4;0.2;0"
                        dur="5.5s"
                        repeatCount="indefinite"
                        begin="3s"
                    />
                </path>
            </g>

            <!-- Capricorn zodiac symbol -->
            <g transform="translate(150,130)">
                <text
                    font-family="serif"
                    font-size="20"
                    fill="#556B2F"
                    text-anchor="middle"
                    dominant-baseline="central"
                >
                    &#x2651;
                </text>
                <animate
                    attributeName="opacity"
                    values="0.5;1;0.5"
                    dur="3s"
                    repeatCount="indefinite"
                />
            </g>

            <!-- Silver sparkle -->
            <path
                d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z"
                fill="#CBD5E0"
                transform="translate(355,280)"
            >
                <animate
                    attributeName="opacity"
                    values="0;0.8;0"
                    dur="2s"
                    repeatCount="indefinite"
                />
                <animateTransform
                    attributeName="transform"
                    type="scale"
                    values="0.5;1.2;0.5"
                    dur="2s"
                    repeatCount="indefinite"
                    additive="sum"
                />
            </path>
        </g>
    </g>
</svg>
