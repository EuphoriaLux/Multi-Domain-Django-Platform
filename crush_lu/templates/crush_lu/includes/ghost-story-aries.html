        <rect x="-32" y="-3" width="64" height="14" rx="3" fill="#ECC94B"/>

        <polygon points="4,-3 14,-22 24,-3" fill="#ECC94B"/>
        <polygon points="24,-3 34,-28 44,-3" fill="#F6AD55"/>

        <circle cx="-18" cy="-14" r="3" fill="#E53E3E">
          <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="0" cy="-18" r="3.5" fill="#E53E3E">
          <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.3s"/>

          <animate attributeName="opacity" values="0.7;1;0.7" dur="2s" repeatCount="indefinite" begin="0.6s"/>

      <g transform="translate(340,210) rotate(-25) scale(1.5)">

        <rect x="-3" y="-45" width="6" height="40" rx="1.5" fill="#CBD5E0"/>

        <rect x="-3" y="-45" width="6" height="40" rx="1.5" fill="#FFD700" opacity="0.3">
          <animate attributeName="opacity" values="0.1;0.5;0.1" dur="2s" repeatCount="indefinite"/>
        </rect>
        <!-- Blade tip -->
        <polygon points="-3,-45 0,-55 3,-45" fill="#E2E8F0"/>
        <!-- Guard -->
        <rect x="-10" y="-6" width="20" height="4" rx="1.5" fill="#ECC94B"/>
        <!-- Grip -->
        <rect x="-3" y="-2" width="6" height="14" rx="1.5" fill="#8B4513"/>
        <!-- Pommel -->
        <circle cx="0" cy="14" r="4.5" fill="#ECC94B"/>
      </g>

      <g transform="translate(148,230) scale(1.5)">

        <path d="M0,-22 L18,-12 L18,10 L0,22 L-18,10 L-18,-12 Z" fill="#E53E3E" stroke="#CC5522" stroke-width="2"/>

      <g transform="translate(205,188)">
        <circle cx="0" cy="0" r="9" fill="#27183f"/>
        <circle cx="2" cy="-2" r="3.5" fill="#FFF" opacity="0.9"/>

        <line x1="-12" y1="-14" x2="6" y2="-11" stroke="#27183f" stroke-width="2.5" stroke-linecap="round"/>

      <g transform="translate(278,188)">
        <circle cx="0" cy="0" r="9" fill="#27183f"/>
        <circle cx="2" cy="-2" r="3.5" fill="#FFF" opacity="0.9"/>
        <circle cx="3" cy="-3" r="1.5" fill="#FFF" opacity="0.5"/>
        <line x1="-6" y1="-11" x2="12" y2="-14" stroke="#27183f" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- Rosy cheeks -->
      <ellipse cx="185" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite"/>

      <ellipse cx="300" cy="218" rx="14" ry="8" fill="#FF8EC6" opacity="0.4">
        <animate attributeName="opacity" values="0.3;0.5;0.3" dur="2s" repeatCount="indefinite" begin="0.4s"/>

        <animate attributeName="d"
          values="M218,242 Q248,270 278,242;M216,242 Q248,274 280,242;M218,242 Q248,270 278,242"
          dur="3s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Aries zodiac symbol -->
      <g transform="translate(365,130)">
        <text font-family="serif" font-size="20" fill="#FF6B35" text-anchor="middle" dominant-baseline="central">&#x2648;</text>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="2.5s" repeatCount="indefinite"/>

      <!-- Ember spark trail -->
      <g transform="translate(350,170)">
        <circle cx="0" cy="0" r="3" fill="#FFD700" opacity="0.7">
