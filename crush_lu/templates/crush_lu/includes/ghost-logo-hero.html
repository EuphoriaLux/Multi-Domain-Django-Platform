<svg xmlns="http://www.w3.org/2000/svg" viewBox="89 75 318 325" class="{{ class|default:'w-7 h-7' }}" aria-hidden="true">

  <!-- Hero variant of ghost-logo-animated. The two eye groups are wrapped in
       <g class="ghost-eye"> so the hero's ghostEyes Alpine component can
       translate them via --eye-x / --eye-y CSS variables on desktop pointers.
       On touch and prefers-reduced-motion the variables stay 0 → no movement. -->

  <g>
    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 -8;0 0;0 -8;0 0"
      dur="3s" repeatCount="indefinite" calcMode="spline"
      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <g>
      <animateTransform attributeName="transform" type="rotate"
        values="0 248 230;-2 248 230;0 248 230;2 248 230;0 248 230"
        dur="4s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      {% include "crush_lu/includes/ghost-core.html" with variant="hero" %}

      <!-- Heart (cursor-tracked: JS rewrites the transform attribute on every
           frame; the heartbeat SMIL uses additive="sum" so it stacks on top
           of whatever translate JS sets, instead of replacing it). -->
      <g class="ghost-heart" transform="translate(248,120)">
        {% include "crush_lu/includes/ghost-heart.html" with pulse=True %}
        <animateTransform attributeName="transform" type="scale" additive="sum"
          values="1;1.25;1;1.15;1;1;1;1"
          dur="1.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.22 0.61 0.36 1;0.22 0.61 0.36 1;0.22 0.61 0.36 1;0.22 0.61 0.36 1;0.22 0.61 0.36 1;0.22 0.61 0.36 1;0.22 0.61 0.36 1"/>
      </g>

      <!-- Sparkles -->
      {% include "crush_lu/includes/ghost-sparkles.html" %}

    </g>
  </g>
</svg>
