<svg xmlns="http://www.w3.org/2000/svg" viewBox="89 75 318 325" class="{{ class|default:'w-7 h-7' }}" aria-hidden="true">
  {# Ghost Story - Pisces Ghost: The Little Mermaid / Dream Weaver — seashell & pearl crown, iridescent mermaid fin, floating harp with musical notes #}

  <g>

    <animateTransform attributeName="transform" type="translate"
      values="0 0;0 -9;0 -3;0 -7;0 0"

      keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

    <g>

      <animateTransform attributeName="transform" type="rotate"
        values="0 248 230;-3 248 230;0 248 230;3 248 230;0 248 230"
        dur="3.5s" repeatCount="indefinite" calcMode="spline"
        keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

          values="1;1.03;1;1.01;1" additive="sum"

          keySplines="0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1;0.45 0 0.55 1"/>

      <!-- Seashell & pearl crown -->
      <g transform="translate(244,128)">
        <!-- Tiara band -->
        <path d="M-40,2 C-26,-3 -10,-5 0,-4 C10,-5 26,-3 40,2" fill="none" stroke="#B2F5EA" stroke-width="2.5"/>

        <g transform="translate(0,-7)">
          <path d="M0,-11 C-5.5,-8 -10,-3 -10,3 L10,3 C10,-3 5.5,-8 0,-11Z" fill="#FBD38D" opacity="0.8"/>

          <line x1="5.5" y1="3" x2="3" y2="-7" stroke="#ECC94B" stroke-width="0.6" opacity="0.5"/>
        </g>
        <!-- Pearls along tiara -->
        <circle cx="-24" cy="0" r="4.5" fill="#FBD38D" opacity="0.7">
          <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>

        <circle cx="-13" cy="-2" r="3.5" fill="#E2E8F0" opacity="0.8"/>
        <circle cx="13" cy="-2" r="3.5" fill="#E2E8F0" opacity="0.8"/>

          <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/>

        <!-- Small starfish accent -->
        <g transform="translate(33,-3) scale(0.8)">
          <polygon points="0,-6 2,-2 6,0 2,2 0,6 -2,2 -6,0 -2,-2" fill="#FEB2B2" opacity="0.7"/>
        </g>
      </g>

      <!-- Iridescent mermaid fin at bottom -->
      <g transform="translate(215,365)">
        <!-- Fin shape -->
        <path d="M0,0 C-21,-7 -35,7 -42,21 C-45,28 -39,31 -28,25 C-21,21 -7,11 0,0Z" fill="#81E6D9" opacity="0.6">

        </path>
        <path d="M0,0 C21,-7 35,7 42,21 C45,28 39,31 28,25 C21,21 7,11 0,0Z" fill="#4ECDC4" opacity="0.5">
          <animate attributeName="fill" values="#4ECDC4;#81E6D9;#B2F5EA;#4ECDC4" dur="4s" repeatCount="indefinite" begin="0.5s"/>
        </path>
        <!-- Fin scales shimmer -->
        <circle cx="-17" cy="11" r="3" fill="#B2F5EA" opacity="0.4">
          <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite"/>

        <circle cx="17" cy="11" r="3" fill="#D6BCFA" opacity="0.3">
          <animate attributeName="opacity" values="0.2;0.5;0.2" dur="2s" repeatCount="indefinite" begin="0.5s"/>

        <line x1="8" y1="22" x2="8" y2="-15" stroke="#ECC94B" stroke-width="2.5"/>
        <path d="M8,-15 C5,-19 2,-22 0,-22" fill="none" stroke="#ECC94B" stroke-width="2.5"/>
        <!-- Harp strings -->
        <line x1="-12" y1="22" x2="0" y2="-18" stroke="#FBD38D" stroke-width="0.7" opacity="0.7"/>
        <line x1="-6" y1="22" x2="3" y2="-15" stroke="#FBD38D" stroke-width="0.7" opacity="0.7"/>
        <line x1="0" y1="22" x2="6" y2="-12" stroke="#FBD38D" stroke-width="0.7" opacity="0.7"/>
      </g>

      <!-- Musical notes floating from harp -->
      <g transform="translate(140,190)">
        <text font-family="serif" font-size="14" fill="#D6BCFA" text-anchor="middle">&#x266A;</text>
        <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="translate"
          values="140 190;135 170;130 150" dur="3s" repeatCount="indefinite"/>
      </g>
      <g transform="translate(155,195)">
        <text font-family="serif" font-size="12" fill="#81E6D9" text-anchor="middle">&#x266B;</text>
        <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite" begin="1s"/>
        <animateTransform attributeName="transform" type="translate"
          values="155 195;150 175;145 155" dur="4s" repeatCount="indefinite" begin="1s"/>
      </g>
      <g transform="translate(142,200)">
        <text font-family="serif" font-size="13" fill="#FBB6CE" text-anchor="middle">&#x266A;</text>
        <animate attributeName="opacity" values="0;0.5;0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
        <animateTransform attributeName="transform" type="translate"
          values="142 200;138 180;134 160" dur="3.5s" repeatCount="indefinite" begin="2s"/>
      </g>

      <!-- Left eye - dreamy, large, dewy -->
      <g transform="translate(205,188)">
        <circle cx="0" cy="0" r="10" fill="#27183f"/>
        <circle cx="0" cy="-2" r="4.5" fill="#FFF" opacity="0.9"/>
        <circle cx="2" cy="-3" r="2.5" fill="#FFF" opacity="0.5"/>
        <!-- Dewy highlight -->
        <circle cx="-3" cy="3" r="1.5" fill="#81E6D9" opacity="0.3"/>
      </g>

      <!-- Right eye - dreamy, large, dewy -->
      <g transform="translate(278,188)">
        <circle cx="0" cy="0" r="10" fill="#27183f"/>
        <circle cx="0" cy="-2" r="4.5" fill="#FFF" opacity="0.9"/>
        <circle cx="2" cy="-3" r="2.5" fill="#FFF" opacity="0.5"/>

        <animate attributeName="opacity" values="0.3;0.55;0.3" dur="2s" repeatCount="indefinite"/>

      <ellipse cx="300" cy="220" rx="15" ry="9" fill="#FBB6CE" opacity="0.45">
        <animate attributeName="opacity" values="0.3;0.55;0.3" dur="2s" repeatCount="indefinite" begin="0.4s"/>

      <path d="M222,244 Q244,266 266,244" fill="#27183f" stroke="#27183f" stroke-width="1">
        <animate attributeName="d"
          values="M222,244 Q244,266 266,244;M221,244 Q244,268 267,244;M222,244 Q244,266 266,244"
          dur="3.5s" repeatCount="indefinite" calcMode="spline"
          keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
      </path>

      <!-- Dreamy bubbles -->
      <circle cx="350" cy="200" r="4" fill="none" stroke="#81E6D9" stroke-width="0.8" opacity="0.5">
        <animate attributeName="cy" values="200;165;130" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.5;0.3;0" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="340" cy="220" r="3" fill="none" stroke="#D6BCFA" stroke-width="0.8" opacity="0.4">
        <animate attributeName="cy" values="220;185;150" dur="3.5s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="opacity" values="0.4;0.2;0" dur="3.5s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="355" cy="210" r="3.5" fill="none" stroke="#B2F5EA" stroke-width="0.8" opacity="0.4">
        <animate attributeName="cy" values="210;175;140" dur="4.5s" repeatCount="indefinite" begin="2s"/>
        <animate attributeName="opacity" values="0.4;0.2;0" dur="4.5s" repeatCount="indefinite" begin="2s"/>
      </circle>

      <!-- Pisces zodiac symbol -->
      <g transform="translate(310,100)">
        <text font-family="serif" font-size="20" fill="#4ECDC4" text-anchor="middle" dominant-baseline="central">&#x2653;</text>
        <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
      </g>

      <!-- Iridescent shimmer sparkle -->
      <path d="M0,-3 L0.8,-0.8 L3,0 L0.8,0.8 L0,3 L-0.8,0.8 L-3,0 L-0.8,-0.8Z" fill="#D6BCFA" transform="translate(355,155)">
        <animate attributeName="opacity" values="0;0.7;0" dur="2.5s" repeatCount="indefinite"/>
        <animate attributeName="fill" values="#D6BCFA;#81E6D9;#FBB6CE;#D6BCFA" dur="4s" repeatCount="indefinite"/>
        <animateTransform attributeName="transform" type="scale"
          values="0.5;1.1;0.5" dur="2.5s" repeatCount="indefinite" additive="sum"/>

    </g>
  </g>
</svg>
