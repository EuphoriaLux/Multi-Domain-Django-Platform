name: Android Release Build

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to target (production or staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CRUSH_ENV: ${{ inputs.environment || 'production' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Full history so the commit count can drive versionCode.
          fetch-depth: 0

      - name: Compute versionCode from commit count
        id: versioncode
        run: echo "value=$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install Signing Keystore
        run: |
          mkdir -p mobile/android/CrushLU/app/keystores
          echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > mobile/android/CrushLU/app/keystores/crush-lu-upload.jks

      - name: Generate gradle.properties
        run: |
          cat <<EOF > mobile/android/CrushLU/gradle.properties
          android.useAndroidX=true
          CRUSH_UPLOAD_STORE_FILE=keystores/crush-lu-upload.jks
          CRUSH_UPLOAD_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          CRUSH_UPLOAD_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}
          CRUSH_UPLOAD_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Build Signed Release App Bundle
        working-directory: mobile/android/CrushLU
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease -PCRUSH_ENV=$CRUSH_ENV -PCRUSH_VERSION_CODE=${{ steps.versioncode.outputs.value }}

      - name: Upload Release Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: mobile/android/CrushLU/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play Store (Internal Track)
        env:
          SERVICE_ACCOUNT_JSON: ${{ secrets.ANDROID_SERVICE_ACCOUNT_JSON }}
        if: ${{ env.SERVICE_ACCOUNT_JSON != '' && env.CRUSH_ENV == 'production' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ env.SERVICE_ACCOUNT_JSON }}
          packageName: lu.crush.app
          releaseFiles: mobile/android/CrushLU/app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          # Release notes shipped from the repo (edit before each release).
          whatsNewDirectory: mobile/android/CrushLU/distribution/whatsnew
