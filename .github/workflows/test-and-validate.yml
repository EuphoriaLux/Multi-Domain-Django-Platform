name: Test and Validate

on:
  pull_request:
    branches: [ main, develop ]
    paths:
      - '**.py'
      - '**.js'
      - '**.html'
      - '**.po'
      - '**.mo'
      - 'requirements.txt'
      - 'package.json'
      - '.github/workflows/test-and-validate.yml'
  workflow_dispatch:

# Cancel any in-progress or queued run for the same branch when a new one starts.
# This prevents queue buildup when multiple pushes happen in quick succession.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Run actual tests (single Python version for speed)
  run-tests:
    name: Run Tests (Python 3.12)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1" "setuptools>=82.0.1" "wheel>=0.47.0"
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-xdist

      # No --cov: the Codecov upload had been failing for months (no
      # CODECOV_TOKEN configured) and nothing consumed the report, so the
      # coverage tracing overhead was pure waste. If coverage is wanted
      # again, add CODECOV_TOKEN to repo secrets, reinstall pytest-cov,
      # and set COVERAGE_CORE=sysmon to keep the tracing cheap.
      # Migration gate: fail if model changes lack a migration, and surface
      # exactly what will run against the production DB during the next
      # slot-swap warm-up (startup.sh runs `migrate --no-input` on container
      # start). Destructive operations (DeleteModel/RemoveField/RenameField)
      # make rollback-by-reswap unsafe — check the plan before merging.
      - name: Migration gate
        env:
          SECRET_KEY: 'ci-test-key'
          USE_AZURE_STORAGE: 'False'
        run: |
          python manage.py makemigrations --check --dry-run
          git fetch origin main --depth=1
          new_migrations=$(git diff --name-only origin/main HEAD -- '*/migrations/*.py')
          echo "## 🗃️ Migrations added by this PR (run against prod at next swap warm-up)" >> $GITHUB_STEP_SUMMARY
          if [ -z "$new_migrations" ]; then
            echo "_none_" >> $GITHUB_STEP_SUMMARY
          else
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "$new_migrations" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            destructive=$(grep -l -E "DeleteModel|RemoveField|RenameField|RenameModel" $new_migrations 2>/dev/null || true)
            if [ -n "$destructive" ]; then
              echo "⚠️ **Destructive operations detected** — rollback-by-reswap will NOT be safe for the release containing:" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              echo "$destructive" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Run tests (parallel with pytest-xdist, SQLite)
        env:
          SECRET_KEY: 'ci-test-key'
          USE_AZURE_STORAGE: 'False'
        run: |
          pytest -m "not playwright" --tb=short -q -x -n auto
        continue-on-error: false

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          # Pinned so lint results don't drift with each upstream release
          # (keep in sync with the local dev venv)
          # flake8 removed — ruff --select=E9,F63,F7,F82 covers the same space.
          pip install black==26.5.1 ruff==0.15.20

      - name: Check code formatting with Black
        run: |
          black --check --diff .
        continue-on-error: true

      - name: Lint with Ruff (critical bugs only — must pass)
        # E9: syntax errors. F63/F7/F82: undefined names, redefined-while-unused.
        # This matches the previous flake8 --select and is the minimum bar that
        # main must always clear. F401/F841 (unused imports/vars) are tracked
        # separately in a follow-up cleanup PR — see .hermes/audit/T2_codequality_findings.md.
        run: |
          ruff check . --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with Ruff (full report — non-blocking)
        # Full ruff run for visibility. Still surfaces F401/F841/F403 debt but
        # does not fail the build; the critical-bugs step above is the gate.
        continue-on-error: true
        run: |
          ruff check . --statistics

  javascript-lint:
    name: JavaScript Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript/CSS formatting
        run: npm run format:check
        continue-on-error: true

  security-check:
    name: Security Check (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit --requirement requirements.txt
        continue-on-error: true

  django-deploy-check:
    name: Django Deploy Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.1.1" "setuptools>=82.0.1" "wheel>=0.47.0"
          pip install -r requirements.txt

      - name: Run manage.py check --deploy against production settings
        # Fails on any security warning, so missing/weakened headers block merge.
        # azureproject.production is the module Azure runs (see wsgi.py). It
        # requires POSTGRESQLCONNSTR_* + SECRET_KEY; we feed dummies since the
        # check validates settings, not live connections. Intentional HSTS-ramp
        # warnings (W005, W021) are silenced via SILENCED_SYSTEM_CHECKS in
        # production.py — remove those entries as the HSTS ramp completes.
        env:
          DJANGO_SETTINGS_MODULE: azureproject.production
          DJANGO_DEBUG: 'False'
          SECRET_KEY: 'ci-deploy-check-secret-key-not-for-production-use-xyz1234567890'
          POSTGRESQLCONNSTR_DEFAULT: 'dbname=ci host=localhost user=ci password=ci'
          CUSTOM_DOMAINS: 'crush.lu,vinsdelux.com,entreprinder.lu,power-up.lu,tableau.lu,delegations.lu,arborist.lu'
          USE_AZURE_STORAGE: 'False'
          APPLICATIONINSIGHTS_CONNECTION_STRING: ''
        run: |
          python manage.py check --deploy --fail-level WARNING

  # Required check: "test" (for branch protection)
  test:
    name: test
    runs-on: ubuntu-latest
    needs: [run-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          echo "Test results: ${{ needs.run-tests.result }}"
          if [ "${{ needs.run-tests.result }}" != "success" ]; then
            echo "::error::Tests failed"
            exit 1
          fi
          echo "✅ Tests passed!"

  # Required check: "validate" (for branch protection)
  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: [lint, javascript-lint, security-check, django-deploy-check]
    if: always()
    steps:
      - name: Check validation results
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "JavaScript lint: ${{ needs.javascript-lint.result }}"
          echo "Security check: ${{ needs.security-check.result }}"
          echo "Django deploy check: ${{ needs.django-deploy-check.result }}"

          # django-deploy-check is the only one here that blocks merge.
          # The other three use continue-on-error so they surface issues
          # without failing CI; keep the same posture for them.
          if [ "${{ needs.django-deploy-check.result }}" != "success" ]; then
            echo "::error::Django deploy check failed — a security setting regressed"
            exit 1
          fi
          echo "✅ Validation passed!"
