name: Android Build Verification

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/android/**'
      - '.github/workflows/android-build-verification.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'mobile/android/**'
      - '.github/workflows/android-build-verification.yml'

jobs:
  build-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android App (Debug and Unsigned Release)
        run: |
          cd mobile/android/CrushLU
          gradle assembleDebug
          gradle bundleRelease
