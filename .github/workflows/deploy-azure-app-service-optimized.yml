# Azure App Service Deployment Workflow
#
# Deployment flow:
# 1. Push to main: validate + test + build run IN PARALLEL
# 2. Deploy to STAGING only after all pass
# 3. Production swap: done manually in Azure Portal
#
# Test staging via: test.crush.lu, test.powerup.lu, etc.

name: Deploy to Azure Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

# Restrict default permissions to read-only (jobs override as needed)
permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast validation (syntax + Django checks) - ~30s
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Validate code
        env:
          SECRET_KEY: 'ci-validation-key'
        run: |
          pip install -q flake8 django
          pip install -q -r requirements.txt
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=migrations,venv,env,.venv,.git,__pycache__
          python -m compileall azureproject entreprinder vinsdelux crush_lu power_up arborist -f -q
          python manage.py check
          echo "✅ Validation passed"

  # Run tests in parallel with validate
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Run tests
        env:
          SECRET_KEY: 'ci-test-key'
        run: |
          pip install -q -r requirements.txt pytest-xdist
          pytest -m "not playwright" --tb=line -q -x -n auto
          echo "✅ Tests passed"

  # Build CSS + collectstatic in parallel with tests
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css:all
          echo "✅ CSS build complete (collectstatic runs during Oryx build on Azure)"

  # Deploy only after validate + test + build all pass
  deploy:
    needs: [validate, test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Azure OIDC authentication
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build deployment package locally
        env:
          SECRET_KEY: 'ci-build-key'
          # Use production settings so collectstatic generates the manifest (staticfiles.json)
          # required by WhiteNoise's CompressedManifestStaticFilesStorage at runtime
          WEBSITE_HOSTNAME: 'ci-build'
          POSTGRESQLCONNSTR_CI: 'dbname=ci host=localhost user=ci password=ci'
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -q -r requirements.txt
          python manage.py collectstatic --noinput
          test -f staticfiles/staticfiles.json || { echo "❌ staticfiles manifest missing"; exit 1; }
          # Fix native extensions for Azure App Service (Debian 11 / GLIBC 2.31)
          # CI runner (ubuntu-latest) has GLIBC 2.39 — cryptography's .abi3.so
          # needs manylinux_2_28 (GLIBC 2.28) to run on Azure
          echo "🔧 Replacing native extensions with Azure-compatible builds..."
          SITE_PKGS="antenv/lib/python3.12/site-packages"
          rm -rf $SITE_PKGS/cryptography* $SITE_PKGS/cffi* $SITE_PKGS/_cffi_backend*
          pip install --no-deps --platform manylinux_2_28_x86_64 --only-binary=:all: \
            --target $SITE_PKGS cryptography cffi
          deactivate
          # Package venv as tar.gz — Oryx expects antenv.tar.gz (not a raw directory)
          tar czf antenv.tar.gz antenv/
          zip -r deploy.zip . -x "*.git*" -x "*__pycache__*" -x "*.pyc" -x "node_modules/*" -x "tailwind-src/*" -x ".github/*" -x "tests/*" -x "*.md" -x "antenv/*"
          echo "✅ Deployment package built locally (with antenv.tar.gz)"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging Slot
        run: |
          az webapp deploy \
            --name django-app-ajfffwjb5ie3s-app-service \
            --resource-group django-app-rg \
            --slot staging \
            --src-path deploy.zip \
            --type zip \
            --restart true

      - name: Verify Deployment
        run: |
          echo "🔥 Waiting for staging to warm up..."
          sleep 15
          echo "Testing staging endpoints:"
          curl -sf -o /dev/null https://test.crush.lu/healthz/ && echo "  ✅ test.crush.lu" || echo "  ❌ test.crush.lu"
          curl -sf -o /dev/null https://test.powerup.lu/healthz/ && echo "  ✅ test.powerup.lu" || echo "  ❌ test.powerup.lu"
          curl -sf -o /dev/null https://test.vinsdelux.com/healthz/ && echo "  ✅ test.vinsdelux.com" || echo "  ❌ test.vinsdelux.com"

      - name: Summary
        run: |
          echo "## 🚀 Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | Staging URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Crush.lu | https://test.crush.lu |" >> $GITHUB_STEP_SUMMARY
          echo "| PowerUp | https://test.powerup.lu |" >> $GITHUB_STEP_SUMMARY
          echo "| VinsDelux | https://test.vinsdelux.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Entreprinder | https://test.entreprinder.lu |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Swap to production manually in Azure Portal when ready.**" >> $GITHUB_STEP_SUMMARY
