# Azure App Service Deployment Workflow
#
# Deployment flow:
# 1. Push to main: build (CSS + collectstatic)
# 2. Deploy to STAGING after build passes
# 3. Production swap: done manually in Azure Portal
#
# Tests/validation run on PRs only (test-and-validate.yml).
# Branch protection enforces strict mode so merged code is always tested.
#
# Test staging via: test.crush.lu, test.powerup.lu, etc.

name: Deploy to Azure Staging

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'
      - 'LICENSE'
  workflow_dispatch:

# Restrict default permissions to read-only (jobs override as needed)
permissions:
  contents: read

# Cancel in-progress runs for the same branch
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build CSS + collectstatic (tests already passed on PR)
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build CSS
        run: |
          npm ci
          npm run build:css:all
          echo "✅ CSS build complete (collectstatic runs during Oryx build on Azure)"

  # Deploy after build (tests already passed on the PR)
  deploy:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Azure OIDC authentication
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Build deployment package locally
        env:
          SECRET_KEY: 'ci-build-key'
          # Use production settings so collectstatic generates the manifest (staticfiles.json)
          # required by WhiteNoise's CompressedManifestStaticFilesStorage at runtime
          WEBSITE_HOSTNAME: 'ci-build'
          POSTGRESQLCONNSTR_CI: 'dbname=ci host=localhost user=ci password=ci'
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -q -r requirements.txt
          python manage.py collectstatic --noinput
          test -f staticfiles/staticfiles.json || { echo "❌ staticfiles manifest missing"; exit 1; }
          # Fix native extensions for Azure App Service (Debian 11 / GLIBC 2.31)
          # CI runner (ubuntu-latest) has GLIBC 2.39 — cryptography's .abi3.so
          # needs manylinux_2_28 (GLIBC 2.28) to run on Azure
          echo "🔧 Replacing native extensions with Azure-compatible builds..."
          SITE_PKGS="antenv/lib/python3.12/site-packages"
          rm -rf $SITE_PKGS/cryptography* $SITE_PKGS/cffi* $SITE_PKGS/_cffi_backend*
          pip install --no-deps --platform manylinux_2_28_x86_64 --only-binary=:all: \
            --target $SITE_PKGS cryptography cffi
          deactivate
          # Package venv as tar.gz without top-level antenv/ prefix
          # Oryx extracts with: tar -xzf antenv.tar.gz -C /antenv
          # So the tar must contain bin/, lib/, etc. directly (not antenv/bin/, antenv/lib/)
          tar czf antenv.tar.gz -C antenv .
          # Build stamp: /readyz/ exposes it so the pipeline (and post-swap
          # checks) can verify which commit a container is actually serving.
          echo "{\"commit\": \"${GITHUB_SHA}\", \"built_at\": \"$(date -u +%FT%TZ)\"}" > build_info.json
          zip -r deploy.zip . -x "*.git*" -x "*__pycache__*" -x "*.pyc" -x "node_modules/*" -x "tailwind-src/*" -x ".github/*" -x "tests/*" -x "*.md" -x "antenv/*"
          echo "✅ Deployment package built locally (with antenv.tar.gz)"

      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Staging Slot
        id: deploy
        run: |
          az webapp deploy \
            --name django-app-ajfffwjb5ie3s-app-service \
            --resource-group django-app-rg \
            --slot staging \
            --src-path deploy.zip \
            --type zip \
            --clean true \
            --restart true

      - name: Verify Deployment
        run: |
          echo "🔥 Waiting for staging to warm up..."
          # Probe the hosts in parallel — wall time is the slowest host, not
          # the sum. curl retries natively (60 attempts, 10s apart ≈ 10 min,
          # matching the WEBSITES_CONTAINER_START_TIME_LIMIT=600 startup
          # budget — startup runs migrations, which can legitimately take
          # minutes) and, unlike a hand-rolled loop, doesn't sleep after the
          # last failure.
          pids=""
          for host in test.crush.lu test.powerup.lu test.vinsdelux.com; do
            (
              if curl -sf -o /dev/null --max-time 10 --retry 59 --retry-delay 10 \
                   --retry-all-errors "https://$host/healthz/"; then
                echo "  ✅ $host"
              else
                echo "  ❌ $host never became healthy"
                exit 1
              fi
            ) &
            pids="$pids $!"
          done
          failed=0
          for pid in $pids; do
            wait "$pid" || failed=1
          done
          exit $failed

      - name: Wait for new build to serve
        # A zip deploy + restart returns while the OLD container still
        # answers (healthz/readyz pass on it too), so poll until /readyz/
        # reports this run's commit before judging the deployment.
        #
        # `-f` matters: the commit stamp comes from build_info.json, a FILE in
        # the deploy package. App Service serves /home/site/wwwroot from shared
        # storage, so the still-running old gunicorn reports the new SHA the
        # moment the files land — while `migrate` only runs later, in
        # startup.sh, when the container actually restarts. Without -f this
        # loop accepts a 503 body, matches the SHA, and hands a
        # mid-migration container to the smoke test ("N unapplied
        # migration(s)"). Failing on non-2xx makes the gate wait for the new
        # build AND a genuinely ready one; the 60x10s budget already covers
        # the startup migration window.
        run: |
          echo "Waiting for staging to serve ${GITHUB_SHA}..."
          for i in $(seq 1 60); do
            if curl -sf --max-time 10 https://test.crush.lu/readyz/ | grep -q "${GITHUB_SHA}"; then
              echo "✅ staging serves ${GITHUB_SHA} and reports ready"
              exit 0
            fi
            sleep 10
          done
          echo "❌ staging never served ${GITHUB_SHA} in a ready state within 10 minutes"
          exit 1

      - name: Smoke Test
        # Deep checks against the staging slot: /readyz/ (DB, migrations,
        # Redis, storage on the live container), home pages, sitemap, login.
        # The same script is run manually against production after a swap:
        #   python scripts/smoke.py --env production
        run: python3 scripts/smoke.py --env staging

      - name: Summary
        # Post the URL table even when verification fails — the build IS on
        # staging at that point, and the links are what you need to debug it.
        # (But not when the deploy itself failed: nothing new is on staging.)
        if: ${{ !cancelled() && steps.deploy.outcome == 'success' }}
        run: |
          echo "## 🚀 Deployed to Staging" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Domain | Staging URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Crush.lu | https://test.crush.lu |" >> $GITHUB_STEP_SUMMARY
          echo "| PowerUp | https://test.powerup.lu |" >> $GITHUB_STEP_SUMMARY
          echo "| VinsDelux | https://test.vinsdelux.com |" >> $GITHUB_STEP_SUMMARY
          echo "| Entreprinder | https://test.entreprinder.lu |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Swap to production manually in Azure Portal when ready.**" >> $GITHUB_STEP_SUMMARY
