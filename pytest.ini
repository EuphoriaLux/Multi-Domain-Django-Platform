[pytest]
DJANGO_SETTINGS_MODULE = azureproject.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q -x -n auto -m "not playwright" --reuse-db
testpaths = crush_lu/tests entreprinder/tests

markers =
    playwright: marks tests as requiring Playwright browser automation
    e2e: marks E2E tests that use dev database (no test DB creation)